<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter','Noto Sans JP',sans-serif; background:#F5F6FA; color:#333; }
a { text-decoration:none; color:inherit; }

/* Page selector tabs */
.page-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
.page-tab { padding:10px 20px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid #EAEDF3; background:#fff; color:#555; transition:all 0.2s; }
.page-tab:hover { border-color:#C9A96E; color:#C9A96E; }
.page-tab.active { background:#C9A96E; color:#fff; border-color:#C9A96E; }

/* Section card */
.section-card { background:#fff; border-radius:10px; border:1px solid #EAEDF3; padding:24px 28px; margin-bottom:16px; }
.section-card h3 { font-size:15px; font-weight:700; color:#1A1A1A; margin-bottom:4px; }
.section-card .section-id { font-size:11px; color:#AAA; margin-bottom:16px; letter-spacing:0.04em; }

/* Field */
.field { margin-bottom:14px; }
.field label { display:block; font-size:12px; font-weight:600; color:#888; margin-bottom:4px; letter-spacing:0.02em; }
.field input, .field textarea { width:100%; padding:10px 12px; border:1px solid #EAEDF3; border-radius:6px; font-size:14px; font-family:inherit; transition:border-color 0.2s; }
.field input:focus, .field textarea:focus { outline:none; border-color:#C9A96E; }
.field textarea { resize:vertical; min-height:80px; line-height:1.7; }

/* Grid layout for short fields */
.field-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:768px) { .field-grid { grid-template-columns:1fr; } }

/* Action bar */
.action-bar { display:flex; justify-content:space-between; align-items:center; margin-top:24px; padding-top:20px; border-top:1px solid #EAEDF3; }
.btn-save { padding:12px 32px; background:#C9A96E; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:background 0.2s; }
.btn-save:hover { background:#B8975A; }
.btn-reset { padding:12px 24px; background:#F5F6FA; color:#555; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
.unsaved { font-size:13px; color:#E74C3C; font-weight:500; }

/* Preview link */
.preview-link { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:#C9A96E; font-weight:600; margin-top:8px; }
.preview-link:hover { text-decoration:underline; }

/* Character counter */
.char-counter { display:inline-block; font-size:11px; color:#AAA; margin-left:8px; }
.char-counter.over { color:#E53935; font-weight:600; }
.field-hint { display:block; color:#AAA; font-size:11px; margin-top:3px; line-height:1.5; }
.field-hint .hint-icon { display:inline-block; width:14px; height:14px; background:#F0F0F0; border-radius:50%; text-align:center; font-size:9px; line-height:14px; margin-right:3px; color:#888; }

/* Image preview */
.img-preview-wrap { margin-top:6px; }
.img-preview { max-width:240px; max-height:160px; border-radius:6px; border:1px solid #EAEDF3; object-fit:cover; display:none; cursor:pointer; transition:opacity 0.2s; }
.img-preview:hover { opacity:0.8; }
.img-preview.loaded { display:block; }
.img-preview-error { display:none; font-size:11px; color:#E53935; margin-top:4px; }
.video-preview { max-width:320px; max-height:180px; border-radius:6px; border:1px solid #EAEDF3; display:none; margin-top:6px; }
.video-preview.loaded { display:block; }

/* Toast */
#toast { display:none; position:fixed; bottom:32px; right:32px; background:#2D2D2D; color:#fff; padding:14px 28px; border-radius:8px; font-size:14px; font-weight:500; z-index:10000; box-shadow:0 4px 16px rgba(0,0,0,0.2); }

/* Mobile admin */
@media(max-width:768px) {
  .admin-sidebar-fix { display:none !important; }
  .admin-main-fix { margin-left:0 !important; }
  .admin-main-fix > div[style*="padding"] { padding:12px !important; }
  .page-tabs { gap:6px; }
  .page-tab { padding:8px 14px; font-size:12px; }
  .section-card { padding:16px; }
  .field-grid { grid-template-columns:1fr; }
}
</style>

    },
    material: {

      sections: [

          { key: 'hero_title', label: 'タイトル（日本語）', type: 'input', default: '素材のこだわり', maxLen: 15 },
          { key: 'hero_title_en', label: 'タイトル（英語）', type: 'input', default: 'MATERIALS', maxLen: 20 }

        { id: 'lineup', title: 'ダウンラインナップ', hint: 'ダウン4種の紹介。各カード画像: 600×400px推奨', fields: [
          { key: 'lineup_title', label: '見出し（英語）', type: 'input', default: 'Down Collection', maxLen: 25 },
          { key: 'lineup_subtitle', label: 'サブテキスト', type: 'input', default: '用途と品質で選べる、4つのダウンライン。', maxLen: 30 }
        ]},
        { id: 'rds', title: 'RDS認証', hint: 'RDS認証バッジ画像: 200×200px推奨', fields: [
          { key: 'rds_title', label: 'タイトル', type: 'input', default: 'Responsible Down Standard', maxLen: 35 },
          { key: 'rds_desc', label: '説明文', type: 'textarea', default: '', maxLen: 150, hint: 'RDS認証の意義と品質保証について' }
        ]},
        { id: 'fabric', title: '生地素材', hint: '生地の比較セクション。サンプル画像: 各600×400px推奨', fields: [
          { key: 'fabric_title', label: '見出し（英語）', type: 'input', default: 'Fabric Quality', maxLen: 25 },
          { key: 'fabric1_title', label: '生地1 タイトル', type: 'input', default: '', maxLen: 20 },
          { key: 'fabric1_desc', label: '生地1 説明', type: 'textarea', default: '', maxLen: 100, hint: '素材特性・メリットを簡潔に' },
          { key: 'fabric2_title', label: '生地2 タイトル', type: 'input', default: '', maxLen: 20 },
          { key: 'fabric2_desc', label: '生地2 説明', type: 'textarea', default: '', maxLen: 100 }
        ]}
      ]
    },
    about: {
      label: '会社概要',
      path: '/about/',
      sections: [
        { id: 'hero', title: 'ヒーロー', hint: 'ヒーロー画像: 1920×400px推奨（会社外観や店舗写真）', fields: [
          { key: 'hero_title', label: 'タイトル（英語）', type: 'input', default: 'About Us', maxLen: 20 },
          { key: 'hero_subtitle', label: 'サブタイトル', type: 'input', default: '', maxLen: 20 }
        ]},
        { id: 'company', title: '会社情報', fields: [
          { key: 'company_name', label: '会社名', type: 'input', default: '', maxLen: 30 },
          { key: 'company_address', label: '所在地', type: 'input', default: '', maxLen: 50 },
          { key: 'company_tel', label: '電話番号', type: 'input', default: '', maxLen: 15, hint: 'ハイフン区切り推奨（例: 03-1234-5678）' },
          { key: 'company_email', label: 'メール', type: 'input', default: '', maxLen: 40 },
          { key: 'company_desc', label: '会社説明', type: 'textarea', default: '', maxLen: 300, hint: '事業内容・理念・沿革など。5〜10文推奨' }
        ]}
      ]
    },
    faq: {
      label: 'FAQ',
      path: '/faq/',
      sections: [
        { id: 'hero', title: 'ヒーロー', fields: [
          { key: 'hero_title', label: 'タイトル', type: 'input', default: 'FAQ', maxLen: 15 },
          { key: 'hero_subtitle', label: 'サブタイトル', type: 'input', default: '', maxLen: 25, hint: '「よくあるご質問」等の日本語補足' }
        ]}
      ]
    },
    shopping_guide: {
      label: 'ショッピングガイド',
      path: '/shopping-guide/',
      sections: [
        { id: 'hero', title: 'ヒーロー', fields: [
          { key: 'hero_title', label: 'タイトル', type: 'input', default: 'Shopping Guide', maxLen: 20 },
          { key: 'hero_subtitle', label: 'サブタイトル', type: 'input', default: '', maxLen: 25 }
        ]},
        { id: 'shipping', title: '配送・決済情報', hint: '配送・返品・決済ポリシーの詳細', fields: [
          { key: 'shipping_text', label: '配送について', type: 'textarea', default: '', maxLen: 300, hint: '送料・配送エリア・日数などを記載' },
          { key: 'return_text', label: '返品について', type: 'textarea', default: '', maxLen: 300, hint: '返品条件・手順・期限を記載' },
          { key: 'payment_text', label: 'お支払いについて', type: 'textarea', default: '', maxLen: 300, hint: '対応決済方法を記載' }
        ]}
      ]
    }
  };

  // ============================================================
  // State
  // ============================================================
  var currentPage = 'top';
  var data = {};
  var dirty = false;

  function loadDataLocal() {
    try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { data = {}; }
  }

  function saveDataLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadData() {
    loadDataLocal();
  }

  function saveData() {
    saveDataLocal();
    dirty = false;
    document.getElementById('unsavedMsg').style.display = 'none';
    showToast('保存しました');
    // API にも送信
    try {
      if (typeof AdminAPI !== 'undefined') {
        AdminAPI.updatePageContent(currentPage, data[currentPage] || {}).then(function() {
          console.log('[Pages] API保存成功: ' + currentPage);
        }).catch(function(err) {
          console.warn('[Pages] API保存失敗:', err.message);
        });
      }
    } catch(e) {
      console.warn('[Pages] API呼び出しエラー:', e.message);
    }
  }

  function markDirty() {
    dirty = true;
    document.getElementById('unsavedMsg').style.display = '';
  }

  function getVal(pageId, key) {
    if (data[pageId] && data[pageId][key] !== undefined) return data[pageId][key];
    return '';
  }

  function setVal(pageId, key, val) {
    if (!data[pageId]) data[pageId] = {};
    data[pageId][key] = val;
    markDirty();
  }

  // ============================================================
  // Hero Video Array
  // ============================================================
  function heroVideoRow(idx, v) {
    v = v || {};
    return '<tr>' +
      '<td style="text-align:center;color:#999;font-weight:600;padding:8px;">' + idx + '</td>' +
      '<td style="padding:8px;"><input type="url" class="hv-url" value="' + escAttr(v.url || '') + '" placeholder="https://.../.mp4" style="width:100%;padding:8px;border:1px solid #DDD;border-radius:6px;font-size:13px;"></td>' +
      '<td style="padding:8px;"><input type="text" class="hv-label" value="' + escAttr(v.label || '') + '" placeholder="例: 春" style="width:100%;padding:8px;border:1px solid #DDD;border-radius:6px;font-size:13px;"></td>' +
      '<td style="padding:8px;"><input type="number" class="hv-duration" value="' + (v.duration || 10) + '" min="5" max="60" style="width:100%;padding:8px;border:1px solid #DDD;border-radius:6px;font-size:13px;"></td>' +
      '<td style="padding:8px;"><button style="background:#FFF0F0;color:#E53935;border:none;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;" onclick="this.closest(\'tr\').remove();syncHeroVideos();">削除</button></td>' +
    '</tr>';
  }

  window.addHeroVideoRow = function() {
    var tbody = document.getElementById('hero-videos-tbody');
    if (!tbody) return;
    var idx = tbody.children.length + 1;
    var tr = document.createElement('tr');
    tr.innerHTML = heroVideoRow(idx, {}).replace(/^<tr>/, '').replace(/<\/tr>$/, '');
    tbody.appendChild(tr);
    syncHeroVideos();
  };

  window.syncHeroVideos = function() {
    var tbody = document.getElementById('hero-videos-tbody');
    if (!tbody) return;
    var videos = [];
    var rows = tbody.querySelectorAll('tr');
    rows.forEach(function(row) {
      var url = row.querySelector('.hv-url');
      var label = row.querySelector('.hv-label');
      var dur = row.querySelector('.hv-duration');
      if (url && url.value.trim()) {
        videos.push({
          url: url.value.trim(),
          label: label ? label.value.trim() : '',
          duration: dur ? parseInt(dur.value) || 10 : 10
        });
      }
    });
    setVal(currentPage, 'hero_videos', videos);
  };

  // Delegate input events on video table
  document.addEventListener('input', function(e) {
    if (e.target.classList.contains('hv-url') || e.target.classList.contains('hv-label') || e.target.classList.contains('hv-duration')) {
      syncHeroVideos();
    }
  });

  // ============================================================
  // Render
  // ============================================================
  function renderTabs() {
    var html = '';
    Object.keys(PAGE_DEFS).forEach(function(id) {
      var cls = id === currentPage ? ' active' : '';
      html += '<div class="page-tab' + cls + '" data-page="' + id + '">' + PAGE_DEFS[id].label + '</div>';
    });
    document.getElementById('pageTabs').innerHTML = html;

    // Bind
    document.querySelectorAll('.page-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        currentPage = this.getAttribute('data-page');
        renderTabs();
        renderEditor();
      });
    });
  }

  function renderEditor() {
    var def = PAGE_DEFS[currentPage];
    if (!def) return;

    var html = '<a class="preview-link" href="..' + def.path + '" target="_blank">&#128065; プレビューを開く（' + def.path + '）</a>';
    html += '<div style="height:16px"></div>';

    def.sections.forEach(function(sec) {
      html += '<div class="section-card">';
      html += '<h3>' + sec.title + '</h3>';
      html += '<div class="section-id">' + currentPage + '.' + sec.id + '</div>';
      if (sec.hint) {
        html += '<div class="field-hint" style="margin-bottom:14px"><span class="hint-icon">i</span>' + sec.hint + '</div>';
      }

      sec.fields.forEach(function(f) {
        var val = getVal(currentPage, f.key) || f.default || '';
        var charLen = val ? val.length : 0;
        html += '<div class="field">';
        html += '<label>' + f.label;
        if (f.maxLen) {
          var overClass = charLen > f.maxLen ? ' over' : '';
          html += ' <span class="char-counter' + overClass + '" data-counter="' + f.key + '">' + charLen + '/' + f.maxLen + '文字</span>';
        }
        html += '</label>';
        if (f.type === 'textarea') {
          html += '<textarea data-page="' + currentPage + '" data-key="' + f.key + '"' + (f.maxLen ? ' data-maxlen="' + f.maxLen + '"' : '') + ' placeholder="' + (f.default || '') + '">' + escHtml(val) + '</textarea>';
        } else if (f.type === 'video_array') {
          // 複数動画管理UI
          var videos = getVal(currentPage, f.key);
          if (!videos || !Array.isArray(videos)) videos = [];
          html += '<div id="video-array-wrap" style="margin-bottom:8px;">';
          html += '<div style="background:#FDF8F0; border:1px solid #E8DCC8; border-radius:8px; padding:10px 14px; margin-bottom:12px; font-size:12px; color:#8B7355; line-height:1.6;">';
          html += '<strong>推奨仕様:</strong> MP4(H.264) / WebM(VP9) | 1920x1080 (16:9) | 3MB以下(10秒) / 5MB以下(30秒) | 24-30fps | 音声なし';
          html += '</div>';
          html += '<table style="width:100%;border-collapse:collapse;font-size:13px;" id="hero-videos-table">';
          html += '<thead><tr><th style="text-align:left;padding:8px;border-bottom:2px solid #EAEDF3;font-size:11px;color:#888;">#</th>';
          html += '<th style="text-align:left;padding:8px;border-bottom:2px solid #EAEDF3;font-size:11px;color:#888;">動画URL</th>';
          html += '<th style="text-align:left;padding:8px;border-bottom:2px solid #EAEDF3;font-size:11px;color:#888;width:100px;">ラベル</th>';
          html += '<th style="text-align:left;padding:8px;border-bottom:2px solid #EAEDF3;font-size:11px;color:#888;width:80px;">表示秒数</th>';
          html += '<th style="width:60px;padding:8px;border-bottom:2px solid #EAEDF3;"></th></tr></thead>';
          html += '<tbody id="hero-videos-tbody">';
          videos.forEach(function(v, idx) {
            html += heroVideoRow(idx + 1, v);
          });
          html += '</tbody></table>';
          html += '<button type="button" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:#C9A96E;background:#FDF8F0;border:1px dashed #C9A96E;cursor:pointer;margin-top:8px;" onclick="addHeroVideoRow()">+ 動画を追加</button>';
          html += '</div>';
        } else if (f.type === 'url') {
          var isVideo = f.key.indexOf('video') !== -1;
          html += '<input type="url" data-page="' + currentPage + '" data-key="' + f.key + '" value="' + escAttr(val) + '" placeholder="https://example.com/image.jpg" style="font-size:13px;">';
          html += '<div class="img-preview-wrap">';
          if (isVideo) {
            html += '<video class="video-preview' + (val ? ' loaded' : '') + '" data-preview="' + f.key + '" muted loop playsinline' + (val ? ' src="' + escAttr(val) + '"' : '') + '></video>';
          } else {
            html += '<img class="img-preview' + (val ? ' loaded' : '') + '" data-preview="' + f.key + '"' + (val ? ' src="' + escAttr(val) + '"' : '') + ' alt="プレビュー">';
          }
          html += '<div class="img-preview-error" data-preview-error="' + f.key + '">画像を読み込めません</div>';
          html += '</div>';
        } else {
          html += '<input type="text" data-page="' + currentPage + '" data-key="' + f.key + '"' + (f.maxLen ? ' data-maxlen="' + f.maxLen + '"' : '') + ' value="' + escAttr(val) + '" placeholder="' + escAttr(f.default || '') + '">';
        }
        if (f.hint) {
          html += '<span class="field-hint"><span class="hint-icon">i</span>' + f.hint + '</span>';
        }
        html += '</div>';
      });

      html += '</div>';
    });

    document.getElementById('editorArea').innerHTML = html;

    // Bind change events with char counter update
    document.querySelectorAll('#editorArea input, #editorArea textarea').forEach(function(el) {
      el.addEventListener('input', function() {
        setVal(this.getAttribute('data-page'), this.getAttribute('data-key'), this.value);
        // Update character counter
        var maxLen = this.getAttribute('data-maxlen');
        if (maxLen) {
          var counter = document.querySelector('[data-counter="' + this.getAttribute('data-key') + '"]');
          if (counter) {
            var len = this.value.length;
            counter.textContent = len + '/' + maxLen + '文字';
            if (len > parseInt(maxLen)) {
              counter.classList.add('over');
            } else {
              counter.classList.remove('over');
            }
          }
        }
      });
    });

    // Bind URL inputs to preview updates
    document.querySelectorAll('#editorArea input[type="url"]').forEach(function(el) {
      el.addEventListener('input', debounce(function() {
        updatePreview(this.getAttribute('data-key'), this.value);
      }.bind(el), 500));
    });

    // Init image previews: attach load/error handlers
    document.querySelectorAll('.img-preview').forEach(function(img) {
      img.addEventListener('load', function() {
        this.classList.add('loaded');
        var errEl = document.querySelector('[data-preview-error="' + this.getAttribute('data-preview') + '"]');
        if (errEl) errEl.style.display = 'none';
      });
      img.addEventListener('error', function() {
        this.classList.remove('loaded');
        var errEl = document.querySelector('[data-preview-error="' + this.getAttribute('data-preview') + '"]');
        if (errEl && this.src) errEl.style.display = 'block';
      });
      // Click to open full image
      img.addEventListener('click', function() {
        if (this.src) window.open(this.src, '_blank');
      });
    });
    document.querySelectorAll('.video-preview').forEach(function(vid) {
      vid.addEventListener('loadeddata', function() {
        this.classList.add('loaded');
        var errEl = document.querySelector('[data-preview-error="' + this.getAttribute('data-preview') + '"]');
        if (errEl) errEl.style.display = 'none';
      });
      vid.addEventListener('error', function() {
        this.classList.remove('loaded');
        var errEl = document.querySelector('[data-preview-error="' + this.getAttribute('data-preview') + '"]');
        if (errEl && this.src) errEl.style.display = 'block';
      });
    });
  }

  function updatePreview(key, url) {
    var img = document.querySelector('[data-preview="' + key + '"]');
    var errEl = document.querySelector('[data-preview-error="' + key + '"]');
    if (!img) return;
    if (errEl) errEl.style.display = 'none';
    if (!url) {
      img.classList.remove('loaded');
      img.removeAttribute('src');
      return;
    }
    img.src = url;
    if (img.tagName === 'VIDEO') img.load();
  }

  var _debounceTimers = {};
  function debounce(fn, ms) {
    return function() {
      var ctx = this, args = arguments;
      var key = args[0] || 'default';
      clearTimeout(_debounceTimers[key]);
      _debounceTimers[key] = setTimeout(function() { fn.apply(ctx, args); }, ms);
    };
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    t.style.opacity = '1';
    setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.style.display = 'none'; t.style.opacity = '1'; }, 300); }, 2000);
  }

  // ============================================================
  // Init
  // ============================================================
  loadData();
  renderTabs();
  renderEditor();

  document.getElementById('saveBtn').addEventListener('click', saveData);
  document.getElementById('resetBtn').addEventListener('click', function() {
    if (confirm('「' + PAGE_DEFS[currentPage].label + '」の編集内容をリセットしますか？')) {
      delete data[currentPage];
      renderEditor();
      markDirty();
    }
  });

  // Warn on leave if dirty
  window.addEventListener('beforeunload', function(e) {
    if (dirty) { e.preventDefault(); e.returnValue = ''; }
  });

  // === データ読み込み: API優先、失敗時はlocalStorageフォールバック ===
  (async function loadFromAPI() {
    try {
      if (typeof AdminAPI !== 'undefined') {
        var apiData = await AdminAPI.getAllPageContent();
        if (apiData && typeof apiData === 'object') {
          data = apiData;
          saveDataLocal();
          renderTabs();
          renderEditor();
          console.log('[Pages] APIからデータ取得成功');
        } else {
          throw new Error('APIデータが空');
        }
      } else {
        throw new Error('AdminAPI未定義');
      }
    } catch(e) {
      console.warn('[Pages] APIフォールバック → localStorage:', e.message);
    }
  })();

})();
</script>
