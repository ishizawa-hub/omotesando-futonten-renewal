<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ管理 | 管理画面 | 表参道布団店。</title>
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === GLOBAL NAV WITH DROPDOWNS === */
.header{position:fixed;top:0;left:0;width:100%;height:72px;z-index:1000;background:rgba(45,45,45,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.header-inner{max-width:1400px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:100%}
.header-logo img{height:28px;width:auto}
.header-nav{display:flex;align-items:center;gap:32px}
.header-nav-item{position:relative}
.header-nav-item>a{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fff;transition:color 0.3s;text-decoration:none;padding:24px 0;display:block}
.header-nav-item>a:hover{color:#C9A96E}
.nav-dropdown{position:absolute;top:100%;left:50%;transform:translateX(-50%);min-width:220px;background:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.12);opacity:0;visibility:hidden;transition:opacity 0.3s,visibility 0.3s;padding:16px 0;z-index:100}
.header-nav-item:hover .nav-dropdown{opacity:1;visibility:visible}
.nav-dropdown a{display:block;padding:10px 28px;font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:13px;font-weight:500;color:#1A1A1A;letter-spacing:0.04em;transition:color 0.2s,background 0.2s;text-decoration:none;white-space:nowrap}
.nav-dropdown a:hover{color:#C9A96E;background:rgba(201,169,110,0.06)}
.nav-mega{position:absolute;top:100%;left:50%;transform:translateX(-50%);width:1100px;background:#fff;box-shadow:0 12px 48px rgba(0,0,0,0.15);opacity:0;visibility:hidden;transition:opacity 0.3s,visibility 0.3s;padding:20px;z-index:100;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.header-nav-item:hover .nav-mega{opacity:1;visibility:visible}
.nav-mega-card{display:block;text-decoration:none;border-radius:6px;overflow:hidden;transition:transform 0.25s,box-shadow 0.25s}
.nav-mega-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.1)}
.nav-mega-card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.nav-mega-card-label{display:block;padding:8px 4px 6px;font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#C9A96E;text-align:center}
.nav-mega-card-name{display:block;padding:0 4px 10px;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;color:#1A1A1A;text-align:center;letter-spacing:0.02em}
.nav-mega-card:hover .nav-mega-card-name{color:#C9A96E}
.header-actions{display:flex;align-items:center;gap:16px}
.header-actions a,.header-actions button{background:none;border:none;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.08em;text-decoration:none;transition:color 0.3s}
.header-actions a:hover,.header-actions button:hover{color:#C9A96E}
.hamburger{display:none;flex-direction:column;gap:6px;background:none;border:none;cursor:pointer;padding:4px}
.hamburger span{display:block;width:28px;height:2px;background:#fff;transition:0.3s}
@media(max-width:1024px){.header-nav{display:none}.hamburger{display:flex}}
@media(max-width:768px){.header-inner{padding:0 20px}.header{height:64px}}
/* === END GLOBAL NAV === */

/* FOOTER */
.footer{padding:80px 0 40px;background:#2D2D2D;color:#fff}
.footer-inner{max-width:1400px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:48px}
.footer-logo{margin-bottom:16px}
.footer-logo img{height:24px}
.footer-desc{font-size:15px;line-height:2;color:rgba(255,255,255,0.4)}
.footer-nav-title{font-size:13px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#C9A96E;margin-bottom:16px}
.footer-nav a{display:block;font-size:15px;color:rgba(255,255,255,0.5);padding:5px 0;letter-spacing:0.03em;transition:color 0.3s;text-decoration:none}
.footer-nav a:hover{color:#C9A96E}
.footer-copy{text-align:center;padding-top:40px;margin-top:40px;border-top:1px solid rgba(255,255,255,0.08);font-size:14px;color:rgba(255,255,255,0.25);letter-spacing:0.06em}
@media(max-width:1024px){.footer-inner{grid-template-columns:1fr 1fr;gap:32px}}
@media(max-width:768px){.footer-inner{grid-template-columns:1fr 1fr;gap:16px 24px;text-align:left}.footer-brand{grid-column:1/-1;text-align:center}.footer-copy{font-size:10px}}

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter','Noto Sans JP',sans-serif; background:#F5F6FA; color:#333; }
  a { text-decoration:none; color:inherit; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:12px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.04em; padding:12px 16px; border-bottom:2px solid #EAEDF3; }
  td { padding:14px 16px; border-bottom:1px solid #F0F0F0; font-size:14px; vertical-align:middle; }
  tr:hover { background:#FAFBFD; }

  /* ステータスバッジ */
  .badge { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; display:inline-block; }
  .badge-pending { background:#FFEBEE; color:#E53935; }
  .badge-progress { background:#FFF3E0; color:#E65100; }
  .badge-done { background:#E8F5E9; color:#4CAF50; }
  .badge-hold { background:#F3E5F5; color:#7B1FA2; }

  /* フィルタ・ボタン */
  .filter-input { padding:8px 14px; border:1px solid #EAEDF3; border-radius:6px; font-size:13px; background:#fff; font-family:inherit; outline:none; }
  .filter-input:focus { border-color:#C9A96E; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:inherit; transition:opacity 0.2s; }
  .btn:hover { opacity:0.85; }
  .btn-gold { background:#C9A96E; color:#fff; }
  .btn-outline { background:#fff; color:#555; border:1px solid #EAEDF3; }
  .btn-sm { padding:5px 10px; font-size:12px; }
  .btn-danger { background:#FFEBEE; color:#E53935; }
  .btn-success { background:#E8F5E9; color:#4CAF50; }
  .btn-info { background:#E3F2FD; color:#1565C0; }

  /* 詳細ビュー */
  .detail-section { background:#fff; border-radius:10px; border:1px solid #EAEDF3; padding:24px; margin-bottom:20px; }
  .detail-footer { display:flex; justify-content:flex-end; gap:8px; padding-top:20px; border-top:1px solid #EAEDF3; margin-top:20px; }

  /* タイムライン */
  .timeline { margin-top:16px; }
  .timeline-item { display:flex; gap:12px; padding-bottom:16px; position:relative; }
  .timeline-item:not(:last-child)::before { content:''; position:absolute; left:11px; top:24px; bottom:0; width:2px; background:#EAEDF3; }
  .timeline-dot { width:24px; height:24px; border-radius:50%; background:#C9A96E; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; flex-shrink:0; }
  .timeline-content { flex:1; }
  .timeline-date { font-size:11px; color:#999; }
  .timeline-text { font-size:13px; color:#333; margin-top:2px; }

  /* トースト */
  .toast { position:fixed; bottom:24px; right:24px; padding:14px 24px; border-radius:8px; font-size:14px; font-weight:600; color:#fff; z-index:300; transform:translateY(100px); opacity:0; transition:all 0.3s ease; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast-success { background:#4CAF50; }
  .toast-error { background:#E53935; }
  .toast-info { background:#1565C0; }

  /* 確認ダイアログ */
  .confirm-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:250; align-items:center; justify-content:center; }
  .confirm-overlay.active { display:flex; }
  .confirm-box { background:#fff; border-radius:12px; padding:28px; width:400px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
  .confirm-box h4 { font-size:16px; margin-bottom:8px; }
  .confirm-box p { font-size:14px; color:#666; margin-bottom:20px; }
  .confirm-btns { display:flex; gap:8px; justify-content:center; }
</style>
</head>

<!-- Main Content -->
<div style="margin-left:260px; min-height:100vh;">
  <!-- Top Bar -->
  <div style="height:64px; background:#fff; border-bottom:1px solid #EAEDF3; display:flex; align-items:center; justify-content:space-between; padding:0 32px; position:sticky; top:0; z-index:50;">
    <h1 style="font-size:18px; font-weight:700; color:#1A1A1A;">お問い合わせ管理</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="width:36px; height:36px; border-radius:50%; background:#C9A96E; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:600;">田</div>
      <div>
        <div style="font-size:13px; font-weight:600; color:#333;">田中 管理者</div>
        <div style="font-size:11px; color:#999;">admin@omotesando-futon.jp</div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div style="padding:28px 32px;">

    <!-- 統計カード -->
    <div id="statsCards" style="display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:28px;"></div>

    <!-- ===== 一覧ビュー ===== -->
    <div id="view-list">
      <!-- フィルタ・CSVエクスポート -->
      <div style="background:#fff; border-radius:10px; border:1px solid #EAEDF3; overflow:hidden;">
        <div style="padding:20px 24px; border-bottom:1px solid #EAEDF3; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
          <h2 style="font-size:16px; font-weight:700;">問い合わせ一覧</h2>
          <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
            <input id="searchInput" type="text" placeholder="名前・メール・件名で検索..." class="filter-input" style="width:220px;">
            <select id="statusFilter" class="filter-input">
              <option value="">すべて</option>
              <option value="未対応">未対応</option>
              <option value="対応中">対応中</option>
              <option value="対応完了">対応完了</option>
              <option value="保留">保留</option>
            </select>
            <select id="categoryFilter" class="filter-input">
              <option value="">すべて</option>
              <option value="商品について">商品について</option>
              <option value="配送について">配送について</option>
              <option value="返品・交換">返品・交換</option>
              <option value="その他">その他</option>
            </select>
            <select id="periodFilter" class="filter-input">
              <option value="">全期間</option>
              <option value="today">今日</option>
              <option value="week">今週</option>
              <option value="month">今月</option>
            </select>
            <div style="position:relative; display:inline-block;">
              <button class="btn btn-gold" onclick="toggleCsvMenu()">&#8681; CSV出力</button>
              <div id="csvMenu" style="display:none; position:absolute; top:100%; right:0; margin-top:4px; background:#fff; border:1px solid #EAEDF3; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.1); z-index:60; min-width:180px;">
                <button onclick="exportCSV('all')" style="display:block; width:100%; padding:10px 16px; border:none; background:none; font-size:13px; font-family:inherit; cursor:pointer; text-align:left; color:#333;" onmouseover="this.style.background='#F5F6FA'" onmouseout="this.style.background='transparent'">全件エクスポート</button>
                <button onclick="exportCSV('filtered')" style="display:block; width:100%; padding:10px 16px; border:none; background:none; font-size:13px; font-family:inherit; cursor:pointer; text-align:left; color:#333; border-top:1px solid #EAEDF3;" onmouseover="this.style.background='#F5F6FA'" onmouseout="this.style.background='transparent'">表示中のみエクスポート</button>
              </div>
            </div>
          </div>
        </div>

        <!-- テーブル -->
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th style="padding-left:24px;">ID</th>
                <th>日時</th>
                <th>お名前</th>
                <th>メールアドレス</th>
                <th>カテゴリ</th>
                <th>件名</th>
                <th style="text-align:center;">ステータス</th>
                <th style="text-align:center;">操作</th>
              </tr>
            </thead>
            <tbody id="inquiryTableBody"></tbody>
          </table>
        </div>

        <!-- 件数表示 -->
        <div id="resultCount" style="padding:16px 24px; font-size:13px; color:#888; border-top:1px solid #EAEDF3;"></div>
      </div>
    </div><!-- /view-list -->

    <!-- ===== 詳細ビュー ===== -->
    <div id="view-detail" style="display:none;">
      <!-- 戻るボタン -->
      <div style="margin-bottom:20px;">
        <button onclick="showListView()" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:#F5F6FA;border:1px solid #EAEDF3;border-radius:8px;font-size:14px;font-weight:600;color:#555;cursor:pointer;font-family:inherit;">
          &#8592; お問い合わせ一覧に戻る
        </button>
      </div>

      <!-- タイトル -->
      <h2 id="detailTitle" style="font-size:18px; font-weight:700; margin-bottom:20px; color:#1A1A1A;"></h2>

      <!-- 基本情報 -->
      <div class="detail-section">
        <h3 style="font-size:14px; font-weight:700; margin-bottom:16px;">基本情報</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div>
            <div style="font-size:11px; color:#999; margin-bottom:4px;">ID</div>
            <div id="detailId" style="font-size:14px; font-weight:600;"></div>
          </div>
          <div>
            <div style="font-size:11px; color:#999; margin-bottom:4px;">日時</div>
            <div id="detailDate" style="font-size:14px;"></div>
          </div>
          <div>
            <div style="font-size:11px; color:#999; margin-bottom:4px;">お名前</div>
            <div id="detailName" style="font-size:14px; font-weight:600;"></div>
          </div>
          <div>
            <div style="font-size:11px; color:#999; margin-bottom:4px;">メールアドレス</div>
            <div id="detailEmail" style="font-size:14px;"></div>
          </div>
          <div>
            <div style="font-size:11px; color:#999; margin-bottom:4px;">電話番号</div>
            <div id="detailPhone" style="font-size:14px;"></div>
          </div>
          <div>
            <div style="font-size:11px; color:#999; margin-bottom:4px;">カテゴリ</div>
            <div id="detailCategory" style="font-size:14px;"></div>
          </div>
        </div>
      </div>

      <!-- 件名・本文 -->
      <div class="detail-section">
        <div style="margin-bottom:20px;">
          <div style="font-size:11px; color:#999; margin-bottom:4px;">件名</div>
          <div id="detailSubject" style="font-size:14px; font-weight:600;"></div>
        </div>
        <div>
          <div style="font-size:11px; color:#999; margin-bottom:4px;">お問い合わせ内容</div>
          <div id="detailContent" style="font-size:14px; line-height:1.8; background:#F9FAFB; padding:16px; border-radius:8px; border:1px solid #EAEDF3;"></div>
        </div>
      </div>

      <!-- ステータス・メモ -->
      <div class="detail-section">
        <div style="margin-bottom:20px;">
          <div style="font-size:11px; color:#999; margin-bottom:6px;">ステータス変更</div>
          <select id="detailStatus" class="filter-input" style="width:200px;">
            <option value="未対応">未対応</option>
            <option value="対応中">対応中</option>
            <option value="対応完了">対応完了</option>
            <option value="保留">保留</option>
          </select>
        </div>
        <div>
          <div style="font-size:11px; color:#999; margin-bottom:6px;">対応メモ</div>
          <textarea id="detailMemo" rows="3" class="filter-input" style="width:100%; resize:vertical;" placeholder="対応メモを入力..."></textarea>
        </div>
        <div class="detail-footer">
          <button class="btn btn-success" onclick="markDoneFromDetail()">対応済み</button>
          <button class="btn btn-gold" onclick="saveDetailChanges()">保存</button>
        </div>
      </div>

      <!-- タイムライン -->
      <div class="detail-section">
        <div style="font-size:11px; color:#999; margin-bottom:8px;">対応履歴</div>
        <div id="detailTimeline" class="timeline"></div>
      </div>

    try { return JSON.parse(stored); } catch(e) {}
  }
  localStorage.setItem('oft_inquiries', JSON.stringify(DEFAULT_INQUIRIES));
  return JSON.parse(JSON.stringify(DEFAULT_INQUIRIES));
}

function saveInquiriesLocal(data) {
  localStorage.setItem('oft_inquiries', JSON.stringify(data));
}

function loadInquiries() {
  return loadInquiriesLocal();
}

function saveInquiries(data) {

}

// === バッジクラス ===
function badgeClass(status) {
  switch(status) {
    case '未対応': return 'badge-pending';
    case '対応中': return 'badge-progress';
    case '対応完了': return 'badge-done';
    case '保留': return 'badge-hold';
    default: return '';
  }
}

// === 日時フォーマット ===
function formatDate(dateStr) {
  const d = new Date(dateStr);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${mm}/${dd} ${hh}:${mi}`;
}

function formatDateFull(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// === フィルタ ===
function getFilteredInquiries() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const category = document.getElementById('categoryFilter').value;
  const period = document.getElementById('periodFilter').value;
  const now = new Date();

  return inquiries.filter(item => {
    // テキスト検索
    if (search && !(item.name.toLowerCase().includes(search) || item.email.toLowerCase().includes(search) || item.subject.toLowerCase().includes(search))) return false;
    // ステータス
    if (status && item.status !== status) return false;
    // カテゴリ
    if (category && item.category !== category) return false;
    // 期間
    if (period) {
      const d = new Date(item.date);
      if (period === 'today') {
        if (d.toDateString() !== now.toDateString()) return false;
      } else if (period === 'week') {
        const weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 7);
        if (d < weekAgo) return false;
      } else if (period === 'month') {
        if (d.getFullYear() !== now.getFullYear() || d.getMonth() !== now.getMonth()) return false;
      }
    }
    return true;
  });
}

// === テーブル描画 ===
function renderTable() {
  filteredInquiries = getFilteredInquiries();
  const tbody = document.getElementById('inquiryTableBody');

  if (filteredInquiries.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px; color:#999;">該当する問い合わせがありません</td></tr>';
  } else {
    tbody.innerHTML = filteredInquiries.map(item => `
      <tr>
        <td style="padding-left:24px; font-weight:600;">#${item.id}</td>
        <td style="color:#888; font-size:13px;">${formatDate(item.date)}</td>
        <td style="font-weight:500;">${item.name}</td>
        <td style="font-size:13px; color:#666;">${item.email}</td>
        <td><span style="font-size:12px; color:#666;">${item.category}</span></td>
        <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.subject}</td>
        <td style="text-align:center;"><span class="badge ${badgeClass(item.status)}">${item.status}</span></td>
        <td style="text-align:center;">
          <button class="btn btn-sm btn-info" onclick="showDetailView('${item.id}')">詳細</button>
          ${item.status !== '対応完了' ? `<button class="btn btn-sm btn-success" onclick="markDone('${item.id}')" style="margin-left:4px;">対応済み</button>` : ''}
          <button class="btn btn-sm btn-danger" onclick="confirmDelete('${item.id}')" style="margin-left:4px;">削除</button>
        </td>
      </tr>
    `).join('');
  }

  document.getElementById('resultCount').textContent = `${filteredInquiries.length} 件表示 / 全 ${inquiries.length} 件`;
}

// === 詳細ビューにデータを流し込む ===
function populateDetail(id) {
  const item = inquiries.find(i => i.id === id);
  if (!item) return;
  currentInquiryId = id;

  document.getElementById('detailTitle').textContent = '#' + item.id + ' - ' + item.subject;
  document.getElementById('detailId').textContent = '#' + item.id;
  document.getElementById('detailDate').textContent = formatDateFull(item.date);
  document.getElementById('detailName').textContent = item.name;
  document.getElementById('detailEmail').textContent = item.email;
  document.getElementById('detailPhone').textContent = item.phone;
  document.getElementById('detailCategory').textContent = item.category;
  document.getElementById('detailSubject').textContent = item.subject;
  document.getElementById('detailContent').textContent = item.content;
  document.getElementById('detailStatus').value = item.status;
  document.getElementById('detailMemo').value = item.memo;

  // タイムライン
  const timeline = document.getElementById('detailTimeline');
  if (item.history && item.history.length > 0) {
    timeline.innerHTML = item.history.slice().reverse().map(h => `
      <div class="timeline-item">
        <div class="timeline-dot">&#10003;</div>
        <div class="timeline-content">
          <div class="timeline-date">${formatDateFull(h.date)}</div>
          <div class="timeline-text">${h.text}</div>
        </div>
      </div>
    `).join('');
  } else {
    timeline.innerHTML = '<div style="font-size:13px; color:#999;">履歴はありません</div>';
  }
}

// === 詳細ビューから保存 ===
function saveDetailChanges() {
  if (!currentInquiryId) return;
  const item = inquiries.find(i => i.id === currentInquiryId);
  if (!item) return;

  const newStatus = document.getElementById('detailStatus').value;
  const newMemo = document.getElementById('detailMemo').value;
  const now = new Date().toISOString();

  if (newStatus !== item.status) {
    item.history.push({ date: now, text: `ステータスを「${newStatus}」に変更しました` });
    item.status = newStatus;
  }
  if (newMemo !== item.memo && newMemo.trim()) {
    item.history.push({ date: now, text: `メモ追加: ${newMemo}` });
    item.memo = newMemo;
  }

  saveInquiries(inquiries);
  renderStats();
  renderTable();
  // 詳細ビューも再描画
  populateDetail(currentInquiryId);
  showToast('変更を保存しました', 'success');
  // API にも送信
  try {
    if (typeof AdminAPI !== 'undefined') {
      AdminAPI.updateInquiry(currentInquiryId, item).then(function() {
        console.log('[Inquiries] API更新成功: ' + currentInquiryId);
      }).catch(function(err) {
        console.warn('[Inquiries] API更新失敗:', err.message);
      });
    }
  } catch(e) { console.warn('[Inquiries] API呼び出しエラー:', e.message); }
}

  const item = inquiries.find(i => i.id === id);
  if (!item) return;
  const now = new Date().toISOString();
  item.history.push({ date: now, text: 'ステータスを「対応完了」に変更しました' });
  item.status = '対応完了';
  saveInquiries(inquiries);
  renderStats();
  renderTable();
  showToast(`#${id} を対応完了にしました`, 'success');
  // API にも送信
  try {
    if (typeof AdminAPI !== 'undefined') {
      AdminAPI.updateInquiry(id, item).then(function() {
        console.log('[Inquiries] API対応完了更新成功: ' + id);
      }).catch(function(err) {
        console.warn('[Inquiries] API対応完了更新失敗:', err.message);
      });

}

// === 削除 ===
function confirmDelete(id) {
  pendingDeleteId = id;
  document.getElementById('confirmMessage').textContent = `#${id} を削除しますか？この操作は取り消せません。`;
  document.getElementById('confirmDialog').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirmDialog').classList.remove('active');
  pendingDeleteId = null;
}

function confirmAction() {
  if (!pendingDeleteId) return;
  const deletedId = pendingDeleteId;
  inquiries = inquiries.filter(i => i.id !== pendingDeleteId);
  saveInquiries(inquiries);
  renderStats();
  renderTable();
  closeConfirm();
  showToast('問い合わせを削除しました', 'error');
  // API にも送信
  try {
    if (typeof AdminAPI !== 'undefined') {
      AdminAPI.deleteInquiry(deletedId).then(function() {
        console.log('[Inquiries] API削除成功: ' + deletedId);
      }).catch(function(err) {
        console.warn('[Inquiries] API削除失敗:', err.message);
      });
    }
  } catch(e) { console.warn('[Inquiries] API呼び出しエラー:', e.message); }
}

// === CSVエクスポート ===
function toggleCsvMenu() {
  const menu = document.getElementById('csvMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

// メニュー外クリックで閉じる
document.addEventListener('click', function(e) {
  const menu = document.getElementById('csvMenu');
  if (!e.target.closest('#csvMenu') && !e.target.closest('[onclick="toggleCsvMenu()"]')) {
    menu.style.display = 'none';
  }
});

function exportCSV(mode) {
  const data = mode === 'all' ? inquiries : filteredInquiries;
  const headers = ['ID','日時','名前','メール','電話','カテゴリ','件名','内容','ステータス','対応メモ'];
  const rows = data.map(item => [
    item.id,
    formatDateFull(item.date),
    item.name,
    item.email,
    item.phone,
    item.category,
    item.subject,
    item.content,
    item.status,
    item.memo
  ]);

  let csvContent = headers.map(h => `"${h}"`).join(',') + '\n';
  rows.forEach(row => {
    csvContent += row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',') + '\n';
  });

  // BOM付きUTF-8
  const bom = '\uFEFF';
  const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `inquiries_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  document.getElementById('csvMenu').style.display = 'none';
  showToast(`${data.length}件のCSVをエクスポートしました`, 'info');
}

// === トースト ===
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast toast-' + type + ' show';
  setTimeout(() => { toast.classList.remove('show'); }, 3000);
}

document.getElementById('searchInput').addEventListener('input', renderTable);
document.getElementById('statusFilter').addEventListener('change', renderTable);
document.getElementById('categoryFilter').addEventListener('change', renderTable);
document.getElementById('periodFilter').addEventListener('change', renderTable);

// === URLハッシュ対応 ===
window.addEventListener('hashchange', function() {
  const hash = location.hash;
  if (hash && hash.startsWith('#detail-')) {
    const id = hash.replace('#detail-', '');
    const item = inquiries.find(i => i.id === id);
    if (item) {
      populateDetail(id);
      document.getElementById('view-list').style.display = 'none';
      document.getElementById('view-detail').style.display = '';
      window.scrollTo(0, 0);
    } else {
      showListView();
    }
  } else {
    document.getElementById('view-list').style.display = '';
    document.getElementById('view-detail').style.display = 'none';
    currentInquiryId = null;
  }
});

// === 初期描画 ===
renderStats();
renderTable();

// 初期ロード時にハッシュがあれば詳細ビューを表示
(function checkInitialHash() {
  const hash = location.hash;
  if (hash && hash.startsWith('#detail-')) {
    const id = hash.replace('#detail-', '');
    const item = inquiries.find(i => i.id === id);
    if (item) {
      showDetailView(id);
    }
  }
})();

// === データ読み込み: API優先、失敗時はlocalStorageフォールバック ===
(async function loadFromAPI() {
  try {
    if (typeof AdminAPI !== 'undefined') {
      const apiData = await AdminAPI.getInquiries();
      if (apiData && Array.isArray(apiData) && apiData.length > 0) {
        inquiries = apiData;
        saveInquiriesLocal(apiData);
        renderStats();
        renderTable();
        console.log('[Inquiries] APIからデータ取得成功 (' + apiData.length + '件)');
      } else {
        throw new Error('APIデータが空');
      }
    } else {
      throw new Error('AdminAPI未定義');
    }
  } catch(e) {
    console.warn('[Inquiries] APIフォールバック → localStorage:', e.message);
  }
})();
</script>
</body>
