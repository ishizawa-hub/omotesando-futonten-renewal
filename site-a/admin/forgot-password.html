<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワードリセット | 表参道布団店。Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin:0; padding:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#2C2C2C; font-family:'Inter','Noto Sans JP',sans-serif;">

<div style="width:100%; max-width:420px; padding:20px;">
  <!-- Card -->
  <div style="background:#fff; border-radius:12px; padding:48px 40px; box-shadow:0 20px 60px rgba(0,0,0,0.3);">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:36px;">
      <div style="font-size:28px; font-weight:700; color:#1A1A1A; letter-spacing:0.02em; margin-bottom:4px;">表参道布団店。</div>
      <div style="font-size:14px; color:#888; font-weight:500; letter-spacing:0.05em;">パスワードリセット</div>
    </div>

    <!-- Description -->
    <p style="font-size:13px; color:#666; line-height:1.7; margin:0 0 24px 0; text-align:center;">
      登録済みのメールアドレスを入力してください。<br>パスワードリセット用のメールをお送りします。
    </p>

    <!-- Form -->
    <form id="resetForm" onsubmit="event.preventDefault(); document.getElementById('resetForm').style.display='none'; document.getElementById('successMsg').style.display='block';">
      <!-- Email -->
      <div style="margin-bottom:24px;">
        <label style="display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:6px;">メールアドレス</label>
        <input type="email" placeholder="admin@omotesando-futon.jp" required
          style="width:100%; padding:12px 14px; border:1px solid #DDD; border-radius:8px; font-size:14px; font-family:inherit; outline:none; transition:border-color 0.2s; box-sizing:border-box; background:#FAFAFA;"
          onfocus="this.style.borderColor='#C9A96E'; this.style.background='#fff';"
          onblur="this.style.borderColor='#DDD'; this.style.background='#FAFAFA';">
      </div>

      <!-- Submit Button -->
      <button type="submit"
        style="width:100%; padding:14px; background:#C9A96E; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; transition:background 0.2s; letter-spacing:0.03em;"
        onmouseover="this.style.background='#B8964E';"
        onmouseout="this.style.background='#C9A96E';">
        パスワードリセットメールを送信
      </button>
    </form>

    <!-- Success Message -->
    <div id="successMsg" style="display:none; text-align:center; padding:20px 0;">
      <div style="width:56px; height:56px; background:#E8F5E9; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; margin-bottom:16px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <p style="font-size:15px; font-weight:600; color:#1A1A1A; margin:0 0 8px 0;">リセットメールを送信しました。</p>
      <p style="font-size:13px; color:#666; margin:0; line-height:1.6;">メールをご確認ください。</p>
    </div>

    <!-- Back to login -->
    <div style="text-align:center; margin-top:20px;">
      <a href="login.html" style="font-size:13px; color:#999; text-decoration:none;"
        onmouseover="this.style.color='#C9A96E';"
        onmouseout="this.style.color='#999';">
        ログインに戻る
      </a>
    </div>
  </div>

  <!-- Footer -->
  <div style="text-align:center; margin-top:24px; font-size:12px; color:#777;">
    &copy; 2026 表参道布団店。 All rights reserved.
  </div>
</div>

</body>
</html>
