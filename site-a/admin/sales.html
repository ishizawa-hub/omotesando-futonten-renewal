<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter','Noto Sans JP',sans-serif; background:#F5F6FA; color:#333; }
  a { text-decoration:none; color:inherit; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:12px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.04em; padding:12px 16px; border-bottom:2px solid #EAEDF3; white-space:nowrap; }
  td { padding:14px 16px; border-bottom:1px solid #F0F0F0; font-size:14px; vertical-align:middle; }
  tr:hover { background:#FAFBFD; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:inherit; transition:all 0.2s; }
  .btn:hover { opacity:0.85; }
  .btn-primary { background:#C9A96E; color:#fff; }
  .btn-outline { background:#fff; color:#333; border:1px solid #DDD; }
  .btn-outline:hover { border-color:#C9A96E; color:#C9A96E; }
  .btn-sm { padding:5px 10px; font-size:11px; }

  /* Admin Layout */
  .admin-sidebar-fix { position:fixed; top:0; left:0; width:260px; height:100vh; background:#fff; border-right:1px solid #EAEDF3; display:flex; flex-direction:column; z-index:100; }
  .admin-main-fix { margin-left:260px; min-height:100vh; }

  /* Toast */
  #toast {
    position:fixed; bottom:32px; right:32px; z-index:100000; background:#2D2D2D; color:#fff;
    padding:14px 24px; border-radius:10px; font-size:14px; font-weight:500;
    box-shadow:0 8px 24px rgba(0,0,0,0.2); border-left:4px solid #C9A96E;
    transition:opacity 0.3s,transform 0.3s; opacity:0; transform:translateY(12px);
    pointer-events:none; display:none;
  }
  #toast.show { opacity:1; transform:translateY(0); pointer-events:auto; display:block; }

  /* Tabs */
  .tab-bar { display:flex; gap:0; border-bottom:2px solid #EAEDF3; background:#fff; padding:0 24px; overflow-x:auto; }
  .tab-btn { padding:14px 18px; font-size:13px; font-weight:600; color:#888; background:none; border:none; cursor:pointer; white-space:nowrap; position:relative; font-family:inherit; transition:color 0.2s; }
  .tab-btn:hover { color:#555; }
  .tab-btn.active { color:#C9A96E; }
  .tab-btn.active::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:#C9A96E; }
  .tab-panel { display:none; padding:24px; }
  .tab-panel.active { display:block; }

  /* Summary Cards */
  .summary-cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:24px; }
  .summary-card {
    background:#fff; border-radius:12px; border:1px solid #EAEDF3; padding:20px;
    display:flex; flex-direction:column; gap:8px;
  }
  .summary-card .label { font-size:11px; font-weight:600; color:#999; text-transform:uppercase; letter-spacing:0.04em; }
  .summary-card .value { font-size:28px; font-weight:700; color:#1A1A1A; line-height:1.2; }
  .summary-card .sub { font-size:12px; color:#999; }
  .summary-card .yoy { font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:4px; }
  .summary-card .yoy.up { color:#4CAF50; }
  .summary-card .yoy.down { color:#E53935; }
  .summary-card .yoy.flat { color:#999; }

  /* Period selector */
  .period-selector { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .period-selector label { font-size:12px; font-weight:600; color:#888; }
  .period-selector input, .period-selector select {
    padding:8px 12px; border:1px solid #DDD; border-radius:8px; font-size:13px;
    font-family:inherit; outline:none; background:#fff;
  }
  .period-selector input:focus, .period-selector select:focus { border-color:#C9A96E; }
  .period-nav { display:flex; gap:4px; }
  .period-nav button { background:#fff; border:1px solid #DDD; border-radius:6px; padding:6px 10px; cursor:pointer; font-size:12px; font-weight:600; }
  .period-nav button:hover { border-color:#C9A96E; color:#C9A96E; }

  /* Bar chart */
  .chart-container { background:#fff; border-radius:12px; border:1px solid #EAEDF3; padding:20px; margin-bottom:24px; }
  .chart-title { font-size:14px; font-weight:700; color:#333; margin-bottom:16px; }
  .bar-chart { display:flex; align-items:flex-end; gap:4px; height:200px; padding:0 4px; }
  .bar-group { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
  .bar-wrap { display:flex; gap:2px; align-items:flex-end; width:100%; justify-content:center; }
  .bar { min-width:12px; border-radius:4px 4px 0 0; transition:height 0.4s ease; cursor:pointer; position:relative; }
  .bar.current { background:#C9A96E; }
  .bar.prev { background:#E0D5C0; }
  .bar:hover { opacity:0.8; }
  .bar-label { font-size:10px; color:#999; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
  .bar-tooltip {
    display:none; position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
    background:#2D2D2D; color:#fff; padding:6px 10px; border-radius:6px; font-size:11px;
    white-space:nowrap; z-index:10; pointer-events:none;
  }
  .bar:hover .bar-tooltip { display:block; }
  .chart-legend { display:flex; gap:16px; margin-top:12px; justify-content:center; }
  .chart-legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:#888; }
  .chart-legend-dot { width:10px; height:10px; border-radius:2px; }

  /* Ranking tables */
  .analysis-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
  .analysis-card { background:#fff; border-radius:12px; border:1px solid #EAEDF3; overflow:hidden; }
  .analysis-card-header { padding:16px 20px; border-bottom:1px solid #EAEDF3; font-size:14px; font-weight:700; color:#333; display:flex; justify-content:space-between; align-items:center; }
  .rank-num { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; font-size:11px; font-weight:700; }
  .rank-1 { background:#C9A96E; color:#fff; }
  .rank-2 { background:#E0D5C0; color:#7A6B4E; }
  .rank-3 { background:#F0EBE0; color:#7A6B4E; }
  .rank-other { background:#F5F6FA; color:#888; }
  .ratio-bar { height:6px; border-radius:3px; background:#F0F0F0; overflow:hidden; min-width:60px; }
  .ratio-bar-fill { height:100%; border-radius:3px; background:#C9A96E; transition:width 0.4s ease; }
  .ratio-text { font-size:12px; font-weight:600; color:#C9A96E; white-space:nowrap; }

  /* Detail table in cumulative */
  .detail-table { width:100%; }
  .detail-table th { padding:10px 16px; font-size:11px; }
  .detail-table td { padding:10px 16px; font-size:13px; }

  /* Responsive */

    .analysis-grid { grid-template-columns:1fr; }
  }
  @media (max-width:768px) {
    .admin-sidebar-fix { display: none !important; }
    .admin-main-fix { margin-left: 0 !important; }
    .summary-cards { grid-template-columns:1fr 1fr; }
    .bar-chart { height:150px; }
  }
</style>

<script>
(function(){
'use strict';

var allOrders = [];
var allProducts = [];

// ============================================================
// 初期化
// ============================================================
function init() {
  if (!AdminAPI.requireAuth()) return;
  loadData();
}

function loadData() {
  Promise.all([
    AdminAPI.getOrders().catch(function(){ return []; }),
    AdminAPI.getProducts().catch(function(){ return []; })
  ]).then(function(res){
    allOrders = res[0] || [];
    allProducts = res[1] || [];
    // 完了・発送済みの注文のみ売上としてカウント（キャンセル除外オプション）
    initControls();
    renderDaily();
  });
}

// ============================================================
// ユーティリティ
// ============================================================
function fmt(n) {
  return Number(n||0).toLocaleString('ja-JP');
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function parseDate(s) {
  return s ? new Date(s) : null;
}

function isSameDay(d1, d2) {
  return d1.getFullYear()===d2.getFullYear() && d1.getMonth()===d2.getMonth() && d1.getDate()===d2.getDate();
}

function isSameMonth(d1, d2) {
  return d1.getFullYear()===d2.getFullYear() && d1.getMonth()===d2.getMonth();
}

function isSameYear(d1, d2) {
  return d1.getFullYear()===d2.getFullYear();
}

function toDateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function toMonthStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

var DOW = ['日','月','火','水','木','金','土'];

// 有効注文のフィルタ（キャンセル除外）
function validOrders(orders) {
  return orders.filter(function(o){ return o.status !== 'キャンセル'; });
}

// 期間フィルタ
function filterByDay(orders, date) {
  return orders.filter(function(o){
    var d = parseDate(o.orderedAt);
    return d && isSameDay(d, date);
  });
}

function filterByMonth(orders, date) {
  return orders.filter(function(o){
    var d = parseDate(o.orderedAt);
    return d && isSameMonth(d, date);
  });
}

function filterByYear(orders, date) {
  return orders.filter(function(o){
    var d = parseDate(o.orderedAt);
    return d && isSameYear(d, date);
  });
}

function filterByRange(orders, start, end) {
  var s = start.getTime(), e = end.getTime() + 86400000; // end日を含む
  return orders.filter(function(o){
    var d = parseDate(o.orderedAt);
    return d && d.getTime() >= s && d.getTime() < e;
  });
}

// 売上合計
function sumTotal(orders) {
  return orders.reduce(function(s,o){ return s + (o.total||0); }, 0);
}

// 平均注文額
function avgTotal(orders) {
  return orders.length ? Math.round(sumTotal(orders) / orders.length) : 0;
}

// 前年同期
function getYoyDate(date) {
  var d = new Date(date);
  d.setFullYear(d.getFullYear() - 1);
  return d;
}

// 前年比の計算
function calcYoy(current, prev) {
  if (!prev || prev === 0) return current > 0 ? { pct: 999, cls: 'up', text: 'N/A (前年データなし)' } : { pct: 0, cls: 'flat', text: '-' };
  var pct = Math.round((current / prev - 1) * 100);
  var cls = pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
  var arrow = pct > 0 ? '&#9650;' : pct < 0 ? '&#9660;' : '&#9644;';
  return { pct: pct, cls: cls, text: arrow + ' ' + (pct >= 0 ? '+' : '') + pct + '%' };
}

// ============================================================
// サマリーカード生成
// ============================================================
function renderSummaryCards(containerId, current, prev, label) {
  var sales = sumTotal(current);
  var prevSales = sumTotal(prev);
  var yoySales = calcYoy(sales, prevSales);

  var count = current.length;
  var prevCount = prev.length;
  var yoyCount = calcYoy(count, prevCount);

  var avg = avgTotal(current);
  var prevAvg = avgTotal(prev);
  var yoyAvg = calcYoy(avg, prevAvg);

  // 客単価
  var uniqueCustomers = {};
  current.forEach(function(o){ var e = o.customer && (o.customer.email || o.customer.name); if(e) uniqueCustomers[e]=true; });
  var custCount = Object.keys(uniqueCustomers).length || 1;
  var perCust = Math.round(sales / custCount);

  var html = '';
  html += '<div class="summary-card">';
  html += '  <div class="label">売上合計</div>';
  html += '  <div class="value">&yen;' + fmt(sales) + '</div>';
  html += '  <div class="yoy ' + yoySales.cls + '">' + yoySales.text + '</div>';
  html += '  <div class="sub">前年' + label + ': &yen;' + fmt(prevSales) + '</div>';
  html += '</div>';

  html += '<div class="summary-card">';
  html += '  <div class="label">注文数</div>';
  html += '  <div class="value">' + fmt(count) + '<span style="font-size:14px;color:#888;margin-left:4px;">件</span></div>';
  html += '  <div class="yoy ' + yoyCount.cls + '">' + yoyCount.text + '</div>';
  html += '  <div class="sub">前年' + label + ': ' + fmt(prevCount) + '件</div>';
  html += '</div>';

  html += '<div class="summary-card">';
  html += '  <div class="label">平均注文額</div>';
  html += '  <div class="value">&yen;' + fmt(avg) + '</div>';
  html += '  <div class="yoy ' + yoyAvg.cls + '">' + yoyAvg.text + '</div>';
  html += '  <div class="sub">前年' + label + ': &yen;' + fmt(prevAvg) + '</div>';
  html += '</div>';

  html += '<div class="summary-card">';
  html += '  <div class="label">顧客数 / 客単価</div>';
  html += '  <div class="value">' + custCount + '<span style="font-size:14px;color:#888;margin-left:4px;">人</span></div>';
  html += '  <div class="sub">客単価: &yen;' + fmt(perCust) + '</div>';
  html += '</div>';

  document.getElementById(containerId).innerHTML = html;
}

// ============================================================
// ランキング分析生成
// ============================================================
function analyzeItems(orders) {
  var map = {};
  orders.forEach(function(o){
    (o.items||[]).forEach(function(item){
      var name = item.name || '不明';
      if(!map[name]) map[name] = { name:name, qty:0, sales:0 };
      var q = parseInt(item.qty)||1;
      var p = parseInt(item.price)||0;
      map[name].qty += q;
      map[name].sales += p * q;
    });
  });
  var arr = Object.values(map);
  arr.sort(function(a,b){ return b.sales - a.sales; });
  return arr;
}

function analyzeColors(orders) {
  var map = {};
  orders.forEach(function(o){
    (o.items||[]).forEach(function(item){
      var color = item.color || '未設定';
      if(!map[color]) map[color] = { color:color, qty:0, sales:0 };
      var q = parseInt(item.qty)||1;
      var p = parseInt(item.price)||0;
      map[color].qty += q;
      map[color].sales += p * q;
    });
  });
  var arr = Object.values(map);
  arr.sort(function(a,b){ return b.sales - a.sales; });
  return arr;
}

function renderRankingTable(items, totalSales, titleLabel, keyProp) {
  if (!items.length) return '<div style="padding:20px; text-align:center; color:#999; font-size:13px;">データなし</div>';
  var html = '<table class="detail-table"><thead><tr>';
  html += '<th style="width:40px">#</th><th>' + titleLabel + '</th><th style="text-align:right">数量</th><th style="text-align:right">売上</th><th style="width:120px">構成比</th></tr></thead><tbody>';
  items.forEach(function(item, i){
    var pct = totalSales > 0 ? (item.sales / totalSales * 100) : 0;
    var rankCls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
    html += '<tr>';
    html += '<td><span class="rank-num ' + rankCls + '">' + (i+1) + '</span></td>';
    html += '<td style="font-weight:600;">' + escHtml(item[keyProp]) + '</td>';
    html += '<td style="text-align:right">' + fmt(item.qty) + '</td>';
    html += '<td style="text-align:right;font-weight:600;">&yen;' + fmt(item.sales) + '</td>';
    html += '<td><div style="display:flex;align-items:center;gap:8px;"><div class="ratio-bar" style="flex:1;"><div class="ratio-bar-fill" style="width:' + pct.toFixed(1) + '%;"></div></div><span class="ratio-text">' + pct.toFixed(1) + '%</span></div></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

function renderAnalysis(containerId, orders) {
  var itemRanking = analyzeItems(orders);
  var colorRanking = analyzeColors(orders);
  var totalSales = sumTotal(orders);

  var html = '';
  // 商品別ランキング
  html += '<div class="analysis-card">';
  html += '<div class="analysis-card-header">商品別ランキング<span style="font-size:11px;color:#999;font-weight:400;">' + itemRanking.length + '商品</span></div>';
  html += renderRankingTable(itemRanking, totalSales, '商品名', 'name');
  html += '</div>';

  // 色別ランキング
  html += '<div class="analysis-card">';
  html += '<div class="analysis-card-header">色別ランキング<span style="font-size:11px;color:#999;font-weight:400;">' + colorRanking.length + '色</span></div>';
  html += renderRankingTable(colorRanking, totalSales, 'カラー', 'color');
  html += '</div>';

  document.getElementById(containerId).innerHTML = html;
}

// ============================================================
// 棒グラフ生成
// ============================================================
function renderBarChart(containerId, data, prevData, labels, title) {
  var maxVal = 0;
  data.forEach(function(v){ if(v > maxVal) maxVal = v; });
  prevData.forEach(function(v){ if(v > maxVal) maxVal = v; });
  if (maxVal === 0) maxVal = 1;

  var html = '<div class="chart-title">' + escHtml(title) + '</div>';
  html += '<div class="bar-chart">';
  for (var i = 0; i < labels.length; i++) {
    var h1 = Math.round(data[i] / maxVal * 180);
    var h2 = Math.round((prevData[i]||0) / maxVal * 180);
    html += '<div class="bar-group">';
    html += '<div class="bar-wrap">';
    if (prevData.length) {
      html += '<div class="bar prev" style="height:' + Math.max(h2,2) + 'px;"><div class="bar-tooltip">前年: &yen;' + fmt(prevData[i]||0) + '</div></div>';
    }
    html += '<div class="bar current" style="height:' + Math.max(h1,2) + 'px;"><div class="bar-tooltip">&yen;' + fmt(data[i]) + '</div></div>';
    html += '</div>';
    html += '<div class="bar-label">' + labels[i] + '</div>';
    html += '</div>';
  }
  html += '</div>';
  html += '<div class="chart-legend">';
  html += '<div class="chart-legend-item"><div class="chart-legend-dot" style="background:#C9A96E;"></div>当期</div>';
  html += '<div class="chart-legend-item"><div class="chart-legend-dot" style="background:#E0D5C0;"></div>前年同期</div>';
  html += '</div>';

  document.getElementById(containerId).innerHTML = html;
}

// ============================================================
// 日売上
// ============================================================
window.shiftDay = function(n) {
  var input = document.getElementById('daily-date');
  var d = new Date(input.value);
  d.setDate(d.getDate() + n);
  input.value = toDateStr(d);
  renderDaily();
};

function renderDaily() {
  var input = document.getElementById('daily-date');
  var date = new Date(input.value);
  var valid = validOrders(allOrders);

  var current = filterByDay(valid, date);
  var prevDate = getYoyDate(date);
  var prev = filterByDay(valid, prevDate);

  // 曜日表示
  document.getElementById('daily-dow').textContent = '(' + DOW[date.getDay()] + ')';

  renderSummaryCards('daily-summary', current, prev, '同日');

  // 時間帯別チャート（0-23時）
  var hourData = new Array(24).fill(0);
  var hourPrev = new Array(24).fill(0);
  var hourLabels = [];
  for (var h = 0; h < 24; h++) {
    hourLabels.push(h + '時');
    current.forEach(function(o){
      var d = parseDate(o.orderedAt);
      if (d && d.getHours() === h) hourData[h] += (o.total||0);
    });
    prev.forEach(function(o){
      var d = parseDate(o.orderedAt);
      if (d && d.getHours() === h) hourPrev[h] += (o.total||0);
    });
  }
  renderBarChart('daily-chart', hourData, hourPrev, hourLabels, '時間帯別売上');

  renderAnalysis('daily-analysis', current);

  // 当日注文一覧
  var orderHtml = '<div class="chart-title">当日の注文一覧</div>';
  if (!current.length) {
    orderHtml += '<div style="padding:20px; text-align:center; color:#999; font-size:13px;">この日の注文はありません</div>';
  } else {
    orderHtml += '<table class="detail-table"><thead><tr><th>時刻</th><th>注文番号</th><th>顧客</th><th>商品</th><th style="text-align:right">金額</th><th>ステータス</th></tr></thead><tbody>';
    current.sort(function(a,b){ return new Date(a.orderedAt) - new Date(b.orderedAt); });
    current.forEach(function(o){
      var d = parseDate(o.orderedAt);
      var time = d ? String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0') : '';
      var custName = o.customer ? (o.customer.name || o.customer.email || '') : '';
      var itemNames = (o.items||[]).map(function(it){ return it.name; }).join(', ');
      orderHtml += '<tr>';
      orderHtml += '<td>' + time + '</td>';
      orderHtml += '<td style="font-weight:600;">' + escHtml(o.orderNumber) + '</td>';
      orderHtml += '<td>' + escHtml(custName) + '</td>';
      orderHtml += '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escHtml(itemNames) + '</td>';
      orderHtml += '<td style="text-align:right;font-weight:600;">&yen;' + fmt(o.total) + '</td>';
      orderHtml += '<td>' + escHtml(o.status) + '</td>';
      orderHtml += '</tr>';
    });
    orderHtml += '</tbody></table>';
  }
  document.getElementById('daily-orders').innerHTML = orderHtml;
}

// ============================================================
// 月売上
// ============================================================
window.shiftMonth = function(n) {
  var input = document.getElementById('monthly-month');
  var parts = input.value.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1+n, 1);
  input.value = toMonthStr(d);
  renderMonthly();
};

function renderMonthly() {
  var input = document.getElementById('monthly-month');
  var parts = input.value.split('-');
  var date = new Date(parseInt(parts[0]), parseInt(parts[1])-1, 1);
  var valid = validOrders(allOrders);

  var current = filterByMonth(valid, date);
  var prevDate = getYoyDate(date);
  var prev = filterByMonth(valid, prevDate);

  renderSummaryCards('monthly-summary', current, prev, '同月');

  // 日別チャート
  var daysInMonth = new Date(date.getFullYear(), date.getMonth()+1, 0).getDate();
  var dayData = [];
  var dayPrev = [];
  var dayLabels = [];
  for (var d = 1; d <= daysInMonth; d++) {
    dayLabels.push(d + '日');
    var dayDate = new Date(date.getFullYear(), date.getMonth(), d);
    var prevDayDate = new Date(prevDate.getFullYear(), prevDate.getMonth(), d);
    dayData.push(sumTotal(filterByDay(valid, dayDate)));
    dayPrev.push(sumTotal(filterByDay(valid, prevDayDate)));
  }
  renderBarChart('monthly-chart', dayData, dayPrev, dayLabels, (date.getMonth()+1) + '月 日別売上推移');

  renderAnalysis('monthly-analysis', current);
}

// ============================================================
// 年売上
// ============================================================
window.shiftYear = function(n) {
  var sel = document.getElementById('yearly-year');
  var y = parseInt(sel.value) + n;
  if (sel.querySelector('option[value="' + y + '"]')) {
    sel.value = y;
  }
  renderYearly();
};

function renderYearly() {
  var year = parseInt(document.getElementById('yearly-year').value);
  var date = new Date(year, 0, 1);
  var valid = validOrders(allOrders);

  var current = filterByYear(valid, date);
  var prevDate = new Date(year - 1, 0, 1);
  var prev = filterByYear(valid, prevDate);

  renderSummaryCards('yearly-summary', current, prev, '年');

  // 月別チャート
  var monthData = [];
  var monthPrev = [];
  var monthLabels = [];
  for (var m = 0; m < 12; m++) {
    monthLabels.push((m+1) + '月');
    var mDate = new Date(year, m, 1);
    var mPrev = new Date(year-1, m, 1);
    monthData.push(sumTotal(filterByMonth(valid, mDate)));
    monthPrev.push(sumTotal(filterByMonth(valid, mPrev)));
  }
  renderBarChart('yearly-chart', monthData, monthPrev, monthLabels, year + '年 月別売上推移');

  renderAnalysis('yearly-analysis', current);
}

// ============================================================
// 累計売上
// ============================================================
window.setCumPreset = function(preset) {
  var now = new Date();
  var startInput = document.getElementById('cum-start');
  var endInput = document.getElementById('cum-end');
  endInput.value = toDateStr(now);

  if (preset === 'all') {
    // 最古の注文日
    var oldest = allOrders.reduce(function(min, o){
      var d = parseDate(o.orderedAt);
      return d && (!min || d < min) ? d : min;
    }, null);
    startInput.value = oldest ? toDateStr(oldest) : toDateStr(new Date(now.getFullYear()-2, 0, 1));
  } else if (preset === 'ytd') {
    startInput.value = now.getFullYear() + '-01-01';
  } else if (preset === 'last12') {
    var d = new Date(now);
    d.setFullYear(d.getFullYear() - 1);
    startInput.value = toDateStr(d);
  }
  renderCumulative();
};

function renderCumulative() {
  var startInput = document.getElementById('cum-start');
  var endInput = document.getElementById('cum-end');
  var start = new Date(startInput.value);
  var end = new Date(endInput.value);
  var valid = validOrders(allOrders);

  var current = filterByRange(valid, start, end);

  // 前年同期間
  var prevStart = getYoyDate(start);
  var prevEnd = getYoyDate(end);
  var prev = filterByRange(valid, prevStart, prevEnd);

  renderSummaryCards('cum-summary', current, prev, '同期間');

  // 月別推移チャート
  var months = [];
  var d = new Date(start.getFullYear(), start.getMonth(), 1);
  var endMonth = new Date(end.getFullYear(), end.getMonth(), 1);
  while (d <= endMonth) {
    months.push(new Date(d));
    d.setMonth(d.getMonth() + 1);
  }

  var mData = [];
  var mPrev = [];
  var mLabels = [];
  months.forEach(function(m){
    var label = m.getFullYear().toString().slice(2) + '/' + (m.getMonth()+1);
    mLabels.push(label);
    mData.push(sumTotal(filterByMonth(valid, m)));
    var pm = getYoyDate(m);
    mPrev.push(sumTotal(filterByMonth(valid, pm)));
  });
  renderBarChart('cum-chart', mData, mPrev, mLabels, '期間内 月別売上推移');

  renderAnalysis('cum-analysis', current);
}

// ============================================================
// タブ切替
// ============================================================
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    var tabs = ['daily','monthly','yearly','cumulative'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p){
    p.classList.toggle('active', p.id === 'tab-' + tab);
  });
  if (tab === 'daily') renderDaily();
  else if (tab === 'monthly') renderMonthly();
  else if (tab === 'yearly') renderYearly();
  else if (tab === 'cumulative') renderCumulative();
};

// ============================================================
// 初期コントロール設定
// ============================================================
function initControls() {
  var now = new Date();

  // 日売上: 今日
  document.getElementById('daily-date').value = toDateStr(now);

  // 月売上: 今月
  document.getElementById('monthly-month').value = toMonthStr(now);

  // 年売上: 年の選択肢生成
  var years = {};
  allOrders.forEach(function(o){
    var d = parseDate(o.orderedAt);
    if (d) years[d.getFullYear()] = true;
  });
  years[now.getFullYear()] = true;
  var yearSel = document.getElementById('yearly-year');
  yearSel.innerHTML = '';
  Object.keys(years).sort().reverse().forEach(function(y){
    var opt = document.createElement('option');
    opt.value = y; opt.textContent = y + '年';
    yearSel.appendChild(opt);
  });
  yearSel.value = now.getFullYear();

  // 累計: 今年初めから今日
  document.getElementById('cum-start').value = now.getFullYear() + '-01-01';
  document.getElementById('cum-end').value = toDateStr(now);
}

// ============================================================
// 起動
// ============================================================
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
