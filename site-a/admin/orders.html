<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter','Noto Sans JP',sans-serif; background:#F5F6FA; color:#333; }
  a { text-decoration:none; color:inherit; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:12px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.04em; padding:12px 16px; border-bottom:2px solid #EAEDF3; white-space:nowrap; }
  td { padding:14px 16px; border-bottom:1px solid #F0F0F0; font-size:14px; vertical-align:middle; }
  tr:hover { background:#FAFBFD; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:inherit; transition:all 0.2s; }
  .btn:hover { opacity:0.85; }
  .btn-primary { background:#C9A96E; color:#fff; }
  .btn-primary:hover { background:#B8964E; }
  .btn-outline { background:#fff; color:#333; border:1px solid #DDD; }
  .btn-outline:hover { border-color:#C9A96E; color:#C9A96E; }
  .btn-danger { background:#fff; color:#DC3545; border:1px solid #DC3545; }
  .btn-danger:hover { background:#DC3545; color:#fff; }
  .btn-warning { background:#fff; color:#E67E22; border:1px solid #E67E22; }
  .btn-warning:hover { background:#E67E22; color:#fff; }
  .btn-sm { padding:5px 10px; font-size:11px; }

  /* Form controls */
  .form-label { display:block; font-size:11px; font-weight:600; color:#999; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px; }
  .form-input, .form-select, .form-textarea {
    width:100%; padding:10px 14px; border:1px solid #DDD; border-radius:8px;
    font-size:13px; font-family:inherit; outline:none; transition:border-color 0.2s;
    background:#fff; box-sizing:border-box;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:#C9A96E; }
  .form-textarea { resize:vertical; min-height:80px; }

  /* Status badges */
  .status-badge {
    display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; white-space:nowrap;
  }

  /* Toast */
  #toast {
    position:fixed; bottom:32px; right:32px; z-index:100000; background:#2D2D2D; color:#fff;
    padding:14px 24px; border-radius:10px; font-size:14px; font-weight:500;
    box-shadow:0 8px 24px rgba(0,0,0,0.2); border-left:4px solid #C9A96E;
    transition:opacity 0.3s,transform 0.3s; opacity:0; transform:translateY(12px);
    pointer-events:none; display:none;
  }
  #toast.show { opacity:1; transform:translateY(0); pointer-events:auto; display:block; }

  /* Modal overlay */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:9999;
    background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
    align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto;
  }
  .modal-overlay.active { display:flex; }

  /* Modal box */
  .modal-box {
    background:#fff; border-radius:12px; width:820px; max-width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.3); margin:auto;
  }
  .modal-header {
    padding:20px 28px; border-bottom:1px solid #EAEDF3;
    display:flex; justify-content:space-between; align-items:center;
  }
  .modal-header h3 { font-size:18px; font-weight:700; color:#1A1A1A; }
  .modal-close { background:none; border:none; font-size:24px; cursor:pointer; color:#999; padding:4px 8px; line-height:1; }
  .modal-close:hover { color:#333; }
  .modal-body { padding:28px; }

  /* Modal sections */
  .modal-section { margin-bottom:28px; }
  .modal-section:last-child { margin-bottom:0; }
  .modal-section-title {
    font-size:13px; font-weight:700; color:#C9A96E; text-transform:uppercase;
    letter-spacing:0.08em; margin-bottom:16px; padding-bottom:8px;
    border-bottom:1px solid #F0F0F0;
  }

  /* Timeline */
  .timeline { padding-left:20px; border-left:2px solid #EAEDF3; }
  .timeline-item { position:relative; padding:0 0 12px 16px; font-size:12px; color:#777; }
  .timeline-item::before {
    content:''; position:absolute; left:-25px; top:4px;
    width:10px; height:10px; border-radius:50%; background:#C9A96E; border:2px solid #fff;
    box-shadow:0 0 0 2px #EAEDF3;
  }
  .timeline-item .timeline-date { font-weight:600; color:#555; }

  /* Items table inside modal */
  .items-table { width:100%; border-collapse:collapse; font-size:13px; }
  .items-table th { font-size:11px; padding:8px 10px; background:#F8F9FC; border-bottom:1px solid #EAEDF3; }
  .items-table td { padding:10px; border-bottom:1px solid #F0F0F0; }
  .items-table .item-remove { color:#DC3545; cursor:pointer; font-size:16px; background:none; border:none; }
  .items-table .item-remove:hover { color:#A71D2A; }

  /* Row status colors */
  tr.row-pending { border-left:3px solid #FFC107; }
  tr.row-processing { border-left:3px solid #17A2B8; }
  tr.row-shipped { border-left:3px solid #28A745; }
  tr.row-delivered { border-left:3px solid #155724; }
  tr.row-cancelled { border-left:3px solid #DC3545; }
  tr.row-return { border-left:3px solid #E67E22; }

  /* Orphan/Widow prevention */
  h1,h2,h3,h4,h5,h6{text-wrap:balance}
  p,li,dd,td,th,blockquote{text-wrap:pretty}
</style>
<style id="admin-mobile-fix">
@media (max-width: 768px) {
  .admin-sidebar-fix { display: none !important; }

  .admin-main-fix div[style*="grid-template-columns:repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
  .admin-main-fix div[style*="grid-template-columns:repeat(3"] { grid-template-columns: 1fr !important; }
  .admin-main-fix table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .admin-main-fix div[style*="display:flex"][style*="justify-content:space-between"] { flex-wrap: wrap !important; gap: 8px !important; }

  .admin-main-fix input[style*="width:240px"], .admin-main-fix input[style*="width:200px"] { width: 100% !important; }
  .modal-box { width:100% !important; }
  .modal-overlay { padding:16px !important; }
}

<script>
(function() {
  'use strict';

  // ========== PERSISTENCE (API優先 + localStorageフォールバック) ==========
  var STORAGE_KEY = 'oft_orders';

  function loadOrdersLocal() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return null;
  }

  function saveOrdersLocal(o) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(o));
  }

  function loadOrders() {
    var local = loadOrdersLocal();
    if (local) return local;
    var sample = generateSampleOrders();
    saveOrdersLocal(sample);
    return sample;
  }

  function saveOrders(o, updatedOrderId, newStatus) {
    saveOrdersLocal(o);
    // API経由でステータス更新（非同期、失敗しても継続）
    if (updatedOrderId && newStatus && typeof AdminAPI !== 'undefined') {
      var wcStatus = reverseStatus(newStatus);
      AdminAPI.updateOrderStatus(updatedOrderId, wcStatus)
        .then(function() { console.log('[Orders] API更新成功: #' + updatedOrderId + ' → ' + wcStatus); })
        .catch(function(e) { console.warn('[Orders] API更新失敗:', e.message); });
    }
  }

  function reverseStatus(jpStatus) {
    var map = { '未処理': 'pending', '処理待ち': 'processing', '発送準備中': 'processing', '発送済み': 'completed', '配達完了': 'completed', 'キャンセル完了': 'cancelled', 'キャンセル済み': 'cancelled', '返品申請中': 'on-hold', '返品完了': 'refunded' };
    return map[jpStatus] || 'processing';
  }

  var orders = loadOrders();

  // API非同期ロード: 成功時にデータ差し替え＆再描画
  (async function loadFromAPI() {
    try {
      if (typeof AdminAPI === 'undefined') throw new Error('AdminAPI未定義');
      var result = await AdminAPI.getOrders();
      var apiOrders = result.orders || result;
      if (Array.isArray(apiOrders) && apiOrders.length > 0) {
        // WooCommerce形式 → 管理画面形式に変換
        orders = apiOrders.map(function(o) {
          return {
            id: String(o.id),
            date: o.date_created || '',
            customer: (o.billing ? (o.billing.last_name || '') + ' ' + (o.billing.first_name || '') : '').trim(),
            email: o.billing ? o.billing.email || '' : '',
            phone: o.billing ? o.billing.phone || '' : '',
            address: o.shipping ? [o.shipping.state, o.shipping.city, o.shipping.address_1, o.shipping.address_2].filter(Boolean).join(' ') : '',
            items: (o.items || []).map(function(item) {
              return { name: item.name, qty: item.quantity, price: parseFloat(item.total) / (item.quantity || 1), size: '', color: '' };
            }),
            status: transformStatus(o.status),
            payment: o.payment_method || '',
            carrier: '', tracking: '', deliveryDate: '', deliveryTime: '',
            shipping: parseFloat(o.shipping_total || 0),
            discount: 0,
            notes: o.customer_note || '',
            statusHistory: []
          };
        });
        saveOrdersLocal(orders);
        updateStats(); renderTable();
        console.log('[Orders] APIからデータ取得成功 (' + orders.length + '件)');
      }
    } catch(e) {
      console.warn('[Orders] APIフォールバック → localStorage:', e.message);
    }
  })();

  function transformStatus(wcStatus) {
    var map = { 'pending': '未処理', 'processing': '処理待ち', 'on-hold': '処理待ち', 'completed': '配達完了', 'cancelled': 'キャンセル済み', 'refunded': '返品完了', 'failed': 'キャンセル済み' };
    return map[wcStatus] || wcStatus;
  }
  var currentOrderId = null;

  // ========== TOAST ==========
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    // Force reflow
    t.offsetHeight;
    t.classList.add('show');
    setTimeout(function() {
      t.classList.remove('show');
      setTimeout(function() { t.style.display = 'none'; }, 300);
    }, 3000);
  }

  // ========== HELPERS ==========
  function calcOrderSubtotal(order) {
    return order.items.reduce(function(sum, item) { return sum + (item.price * item.qty); }, 0);
  }
  function calcOrderTotal(order) {
    return calcOrderSubtotal(order) + (order.shipping || 0) - (order.discount || 0);
  }
  function formatYen(n) {
    return '\u00A5' + n.toLocaleString();
  }
  function statusBadgeHTML(status) {
    var s = STATUS_STYLES[status] || { bg:'#EEE', color:'#555' };
    return '<span class="status-badge" style="background:'+s.bg+';color:'+s.color+';">'+status+'</span>';
  }
  function getOrder(id) {
    for (var i = 0; i < orders.length; i++) { if (orders[i].id === id) return orders[i]; }
    return null;
  }
  function getNow() {
    var d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ========== STATS ==========
  function updateStats() {
    document.getElementById('statTotal').textContent = orders.length;
    var pending = orders.filter(function(o) { return o.status === '未処理' || o.status === '処理待ち'; }).length;
    document.getElementById('statPending').textContent = pending;
    var shipped = orders.filter(function(o) { return o.status === '発送済み'; }).length;
    document.getElementById('statShipped').textContent = shipped;
    var revenue = orders.filter(function(o) { return o.status.indexOf('キャンセル') === -1; }).reduce(function(s, o) { return s + calcOrderTotal(o); }, 0);
    document.getElementById('statRevenue').textContent = formatYen(revenue);
  }

  // ========== RENDER TABLE ==========
  function renderTable() {
    var tbody = document.getElementById('orderTableBody');
    var statusFilter = document.getElementById('filterStatus').value;
    var paymentFilter = document.getElementById('filterPayment').value;
    var dateRangeFilter = document.getElementById('filterDateRange').value;
    var search = document.getElementById('searchInput').value.trim().toLowerCase();
    var dateFrom = document.getElementById('dateFrom').value;
    var dateTo = document.getElementById('dateTo').value;

    var today = new Date(); today.setHours(0,0,0,0);
    var weekStart = new Date(today); weekStart.setDate(weekStart.getDate() - weekStart.getDay());
    var monthStart = new Date(today.getFullYear(), today.getMonth(), 1);

    var filtered = orders.filter(function(o) {
      if (statusFilter !== 'all' && o.status !== statusFilter) return false;
      if (paymentFilter !== 'all' && o.payment !== paymentFilter) return false;
      if (search && ('#'+o.id).toLowerCase().indexOf(search) === -1 && o.customer.toLowerCase().indexOf(search) === -1) return false;
      var oDate = new Date(o.date.replace(' ','T'));
      if (dateRangeFilter === 'today' && oDate < today) return false;
      if (dateRangeFilter === 'week' && oDate < weekStart) return false;
      if (dateRangeFilter === 'month' && oDate < monthStart) return false;
      if (dateRangeFilter === 'custom') {
        if (dateFrom && oDate < new Date(dateFrom)) return false;
        if (dateTo && oDate > new Date(dateTo + 'T23:59:59')) return false;
      }
      return true;
    });

    var html = '';
    filtered.forEach(function(o) {
      var total = calcOrderTotal(o);
      var rowClass = STATUS_ROW_CLASS[o.status] || '';
      var itemNames = o.items.map(function(i) { return i.name; }).join(', ');
      var dateShort = o.date.replace(/^\d{4}-/, '').replace(' ', ' ');
      html += '<tr class="'+rowClass+'" data-id="'+o.id+'" style="cursor:pointer;" onclick="openOrderDetail(\''+o.id+'\')">';
      html += '<td style="padding-left:24px;font-weight:600;">#'+escapeHtml(o.id)+'</td>';
      html += '<td>'+escapeHtml(o.customer)+'</td>';
      html += '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHtml(itemNames)+'</td>';
      html += '<td style="text-align:right;font-weight:600;">'+formatYen(total)+'</td>';
      html += '<td style="text-align:center;">'+statusBadgeHTML(o.status)+'</td>';
      html += '<td style="font-size:12px;">'+escapeHtml(o.payment)+'</td>';
      html += '<td style="font-size:12px;">'+(o.carrier ? escapeHtml(o.carrier) : '-')+'</td>';
      html += '<td style="font-size:12px;font-family:monospace;">'+(o.tracking ? escapeHtml(o.tracking) : '-')+'</td>';
      html += '<td style="color:#888;font-size:13px;white-space:nowrap;">'+escapeHtml(dateShort)+'</td>';
      html += '</tr>';
    });
    if (!filtered.length) {
      html = '<tr><td colspan="9" style="text-align:center;padding:40px;color:#999;">該当する注文がありません</td></tr>';
    }
    tbody.innerHTML = html;
    updateStats();
  }

  // ========== FILTER EVENTS ==========
  var filterIds = ['filterStatus','filterPayment','filterDateRange','searchInput','dateFrom','dateTo'];
  filterIds.forEach(function(id) {
    var el = document.getElementById(id);
    el.addEventListener('change', renderTable);
    el.addEventListener('input', renderTable);
  });
  document.getElementById('filterDateRange').addEventListener('change', function() {
    document.getElementById('customDateRange').style.display = this.value === 'custom' ? 'flex' : 'none';
  });

  // ========== CSV EXPORT ==========
  document.getElementById('csvExportBtn').addEventListener('click', function() {
    var headers = ['注文番号','お客様名','メール','電話番号','商品','金額','ステータス','決済方法','配送業者','追跡番号','注文日時'];
    var rows = orders.map(function(o) {
      return [
        '#'+o.id, o.customer, o.email, o.phone,
        o.items.map(function(i){ return i.name+'('+i.size+'/'+i.color+') x'+i.qty; }).join(' | '),
        calcOrderTotal(o), o.status, o.payment, o.carrier||'', o.tracking||'', o.date
      ];
    });
    var csv = '\uFEFF' + headers.join(',') + '\n';
    rows.forEach(function(r) {
      csv += r.map(function(v) { return '"' + String(v).replace(/"/g,'""') + '"'; }).join(',') + '\n';
    });
    var blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'orders_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click(); URL.revokeObjectURL(url);
    showToast('CSVファイルをエクスポートしました');
  });

  // ========== REFUND RADIO TOGGLE ==========
  var refundRadios = document.querySelectorAll('input[name="refundType"]');
  for (var i = 0; i < refundRadios.length; i++) {
    refundRadios[i].addEventListener('change', function() {
      document.getElementById('partialRefundRow').style.display = this.value === 'partial' ? 'block' : 'none';
    });
  }

  // ========== ITEM ROW RENDERING ==========
  function renderItemRow(item, idx) {
    return '<tr data-idx="'+idx+'">'
      + '<td><input class="form-input item-name" value="'+escapeHtml(item.name)+'" style="min-width:140px;"></td>'
      + '<td><input class="form-input item-size" value="'+escapeHtml(item.size)+'" style="width:80px;"></td>'
      + '<td><input class="form-input item-color" value="'+escapeHtml(item.color)+'" style="width:80px;"></td>'
      + '<td style="text-align:center;"><input type="number" class="form-input item-qty" value="'+item.qty+'" min="1" style="width:56px;text-align:center;" onchange="recalcItems()"></td>'
      + '<td style="text-align:right;"><input type="number" class="form-input item-price" value="'+item.price+'" min="0" style="width:100px;text-align:right;" onchange="recalcItems()"></td>'
      + '<td style="text-align:right;font-weight:600;" class="item-subtotal">'+formatYen(item.price * item.qty)+'</td>'
      + '<td><button class="item-remove" onclick="removeItemRow(this)" title="削除">&times;</button></td>'
      + '</tr>';
  }

  // ========== OPEN ORDER DETAIL MODAL ==========
  window.openOrderDetail = function(id) {
    currentOrderId = id;
    var order = getOrder(id);
    if (!order) return;

    var subtotal = calcOrderSubtotal(order);
    var total = calcOrderTotal(order);

    var html = '';

    // Section A: 注文概要
    html += '<div class="modal-section">';
    html += '<div class="modal-section-title">A. 注文概要</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';
    html += '<div><div class="form-label">注文番号</div><div style="font-size:20px;font-weight:700;color:#1A1A1A;">#'+escapeHtml(order.id)+'</div></div>';
    html += '<div><div class="form-label">注文日時</div><div style="font-size:15px;">'+escapeHtml(order.date)+'</div></div>';
    html += '<div><div class="form-label">ステータス</div>';
    html += '<select id="detailStatus" class="form-select">';
    ALL_STATUSES.forEach(function(s) {
      html += '<option value="'+s+'"'+(s===order.status?' selected':'')+'>'+s+'</option>';
    });
    html += '</select></div>';
    html += '<div><div class="form-label">決済方法</div><div style="font-size:14px;">'+escapeHtml(order.payment)+'</div></div>';
    html += '</div>';
    // Status history timeline
    if (order.statusHistory && order.statusHistory.length) {
      html += '<div style="margin-top:16px;"><div class="form-label">ステータス変更履歴</div>';
      html += '<div class="timeline">';
      order.statusHistory.slice().reverse().forEach(function(h) {
        html += '<div class="timeline-item"><span class="timeline-date">'+escapeHtml(h.date)+'</span> ';
        html += h.from ? (escapeHtml(h.from) + ' &rarr; ' + escapeHtml(h.to)) : ('初期: ' + escapeHtml(h.to));
        html += '</div>';
      });
      html += '</div></div>';
    }
    html += '</div>';

    // Section B: 顧客情報
    html += '<div class="modal-section">';
    html += '<div class="modal-section-title">B. 顧客情報</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">';
    html += '<div><div class="form-label">お名前</div><div style="font-size:14px;font-weight:600;"><a href="customers.html" style="color:#C9A96E;text-decoration:underline;">'+escapeHtml(order.customer)+'</a></div></div>';
    html += '<div><div class="form-label">メール</div><div style="font-size:13px;">'+escapeHtml(order.email)+'</div></div>';
    html += '<div><div class="form-label">電話番号</div><div style="font-size:13px;">'+escapeHtml(order.phone)+'</div></div>';
    html += '</div></div>';

    // Section C: 配送先情報
    html += '<div class="modal-section">';
    html += '<div class="modal-section-title">C. 配送先情報</div>';
    html += '<div style="margin-bottom:12px;"><div class="form-label">住所</div><div style="font-size:14px;line-height:1.6;">'+escapeHtml(order.address)+'</div></div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';
    html += '<div><div class="form-label">配送業者</div><select id="detailCarrier" class="form-select"><option value="">未選択</option>';
    CARRIERS.forEach(function(c) { html += '<option value="'+c+'"'+(c===order.carrier?' selected':'')+'>'+c+'</option>'; });
    html += '</select></div>';
    html += '<div><div class="form-label">配送追跡番号</div><input id="detailTracking" class="form-input" value="'+escapeHtml(order.tracking||'')+'" placeholder="追跡番号を入力..."></div>';
    html += '<div><div class="form-label">配達希望日</div><input type="date" id="detailDeliveryDate" class="form-input" value="'+(order.deliveryDate||'')+'"></div>';
    html += '<div><div class="form-label">配達時間帯</div><select id="detailDeliveryTime" class="form-select">';
    TIME_SLOTS.forEach(function(t) { html += '<option value="'+t+'"'+(t===order.deliveryTime?' selected':'')+'>'+t+'</option>'; });
    html += '</select></div>';
    html += '</div></div>';

    // Section D: 注文商品
    html += '<div class="modal-section">';
    html += '<div class="modal-section-title">D. 注文商品</div>';
    html += '<div style="overflow-x:auto;"><table class="items-table"><thead><tr><th>商品名</th><th>サイズ</th><th>カラー</th><th style="text-align:center;width:60px;">数量</th><th style="text-align:right;">単価</th><th style="text-align:right;">小計</th><th style="width:32px;"></th></tr></thead>';
    html += '<tbody id="detailItemsBody">';
    order.items.forEach(function(item, idx) {
      html += renderItemRow(item, idx);
    });
    html += '</tbody></table></div>';
    html += '<button class="btn btn-outline btn-sm" style="margin-top:10px;" onclick="addItemRow()">+ 商品を追加</button>';
    html += '</div>';

    // Section E: 金額
    html += '<div class="modal-section">';
    html += '<div class="modal-section-title">E. 金額</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:12px;">';
    html += '<div><div class="form-label">小計</div><div id="detailSubtotal" style="font-size:15px;font-weight:600;">'+formatYen(subtotal)+'</div></div>';
    html += '<div><div class="form-label">送料</div><input type="number" id="detailShipping" class="form-input" value="'+(order.shipping||0)+'" min="0" onchange="recalcTotal()"></div>';
    html += '<div><div class="form-label">割引/クーポン</div><input type="number" id="detailDiscount" class="form-input" value="'+(order.discount||0)+'" min="0" onchange="recalcTotal()"></div>';
    html += '</div>';
    html += '<div style="display:flex;align-items:baseline;gap:12px;">';
    html += '<div class="form-label" style="margin-bottom:0;">合計</div>';
    html += '<div id="detailTotal" style="font-size:24px;font-weight:700;color:#C9A96E;">'+formatYen(total)+'</div>';
    html += (order.shipping === 0 ? '<span style="font-size:11px;color:#28A745;font-weight:600;">送料無料</span>' : '');
    html += '</div></div>';

    // Section F: アクション
    html += '<div class="modal-section">';
    html += '<div class="modal-section-title">F. アクション</div>';
    html += '<div style="margin-bottom:16px;"><div class="form-label">注文メモ（内部用）</div>';
    html += '<textarea id="detailNotes" class="form-textarea" placeholder="メモを入力...">'+escapeHtml(order.notes||'')+'</textarea></div>';
    html += '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
    html += '<button class="btn btn-primary" onclick="saveOrderDetail()" style="flex:1;min-width:160px;">注文を更新</button>';
    html += '<button class="btn btn-outline" onclick="issueReceipt()" style="white-space:nowrap;">領収書を発行</button>';
    html += '</div>';
    html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;">';
    html += '<button class="btn btn-danger" onclick="openCancelModal()">注文をキャンセル</button>';
    html += '<button class="btn btn-warning" onclick="openReturnModal()">返品処理</button>';
    html += '</div>';
    html += '</div>';

    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('orderModal').classList.add('active');
  };

  window.addItemRow = function() {
    var tbody = document.getElementById('detailItemsBody');
    var idx = tbody.querySelectorAll('tr').length;
    var newItem = {name:'',size:'',color:'',qty:1,price:0};
    tbody.insertAdjacentHTML('beforeend', renderItemRow(newItem, idx));
  };

  window.removeItemRow = function(btn) {
    var row = btn.closest('tr');
    row.remove();
    window.recalcItems();
  };

  window.recalcItems = function() {
    var subtotal = 0;
    var rows = document.querySelectorAll('#detailItemsBody tr');
    for (var i = 0; i < rows.length; i++) {
      var tr = rows[i];
      var qty = parseInt(tr.querySelector('.item-qty').value) || 0;
      var price = parseInt(tr.querySelector('.item-price').value) || 0;
      var st = qty * price;
      subtotal += st;
      tr.querySelector('.item-subtotal').textContent = formatYen(st);
    }
    document.getElementById('detailSubtotal').textContent = formatYen(subtotal);
    window.recalcTotal();
  };

  window.recalcTotal = function() {
    var subtotalText = document.getElementById('detailSubtotal').textContent;
    var subtotal = parseInt(subtotalText.replace(/[^\d]/g, '')) || 0;
    var shipping = parseInt(document.getElementById('detailShipping').value) || 0;
    var discount = parseInt(document.getElementById('detailDiscount').value) || 0;
    var total = subtotal + shipping - discount;
    document.getElementById('detailTotal').textContent = formatYen(total);
  };

  // ========== SAVE ORDER DETAIL ==========
  window.saveOrderDetail = function() {
    var order = getOrder(currentOrderId);
    if (!order) return;
    var newStatus = document.getElementById('detailStatus').value;

    // Track status change
    if (newStatus !== order.status) {
      if (!order.statusHistory) order.statusHistory = [];
      order.statusHistory.push({ date: getNow(), from: order.status, to: newStatus });
      order.status = newStatus;
    }

    // Update shipping info
    order.carrier = document.getElementById('detailCarrier').value;
    order.tracking = document.getElementById('detailTracking').value.trim();
    order.deliveryDate = document.getElementById('detailDeliveryDate').value;
    order.deliveryTime = document.getElementById('detailDeliveryTime').value;
    order.shipping = parseInt(document.getElementById('detailShipping').value) || 0;
    order.discount = parseInt(document.getElementById('detailDiscount').value) || 0;
    order.notes = document.getElementById('detailNotes').value.trim();

    // Update items from table
    var newItems = [];
    var itemRows = document.querySelectorAll('#detailItemsBody tr');
    for (var i = 0; i < itemRows.length; i++) {
      var tr = itemRows[i];
      newItems.push({
        name: tr.querySelector('.item-name').value,
        size: tr.querySelector('.item-size').value,
        color: tr.querySelector('.item-color').value,
        qty: parseInt(tr.querySelector('.item-qty').value) || 1,
        price: parseInt(tr.querySelector('.item-price').value) || 0
      });
    }
    order.items = newItems;

    saveOrders(orders);
    renderTable();
    closeModal();
    showToast('注文 #'+order.id+' を更新しました');
  };

  // ========== RECEIPT ==========
  window.issueReceipt = function() {
    showToast('領収書を発行しました（#'+currentOrderId+'）');
  };

  // ========== CLOSE MODALS ==========
  window.closeModal = function() {
    document.getElementById('orderModal').classList.remove('active');
    currentOrderId = null;
  };
  window.closeCancelModal = function() {
    document.getElementById('cancelModal').classList.remove('active');
  };
  window.closeReturnModal = function() {
    document.getElementById('returnModal').classList.remove('active');
  };

  // Backdrop click close
  ['orderModal','cancelModal','returnModal'].forEach(function(id) {
    document.getElementById(id).addEventListener('click', function(e) {
      if (e.target === this) {
        this.classList.remove('active');
        if (id === 'orderModal') currentOrderId = null;
      }
    });
  });
  // Escape key close
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      var modals = document.querySelectorAll('.modal-overlay.active');
      for (var i = 0; i < modals.length; i++) { modals[i].classList.remove('active'); }
    }
  });

  // ========== CANCEL FLOW ==========
  window.openCancelModal = function() {
    if (!currentOrderId) return;
    document.getElementById('cancelReason').value = '';
    document.getElementById('cancelDetail').value = '';
    document.querySelector('input[name="refundType"][value="full"]').checked = true;
    document.getElementById('partialRefundRow').style.display = 'none';
    document.getElementById('partialRefundAmount').value = '';
    document.getElementById('cancelModal').classList.add('active');
  };

  window.confirmCancel = function() {
    var reason = document.getElementById('cancelReason').value;
    if (!reason) { showToast('キャンセル理由を選択してください'); return; }
    var detail = document.getElementById('cancelDetail').value.trim();
    var refundType = document.querySelector('input[name="refundType"]:checked').value;
    var refundNote = '';
    if (refundType === 'full') refundNote = '全額返金';
    else if (refundType === 'partial') refundNote = '一部返金: ' + formatYen(parseInt(document.getElementById('partialRefundAmount').value)||0);
    else refundNote = '返金なし';

    var order = getOrder(currentOrderId);
    if (!order) return;
    if (!order.statusHistory) order.statusHistory = [];
    order.statusHistory.push({ date: getNow(), from: order.status, to: 'キャンセル申請' });
    order.status = 'キャンセル完了';
    order.statusHistory.push({ date: getNow(), from: 'キャンセル申請', to: 'キャンセル完了' });
    order.notes = (order.notes ? order.notes + '\n' : '') + '[キャンセル] 理由: ' + reason + (detail ? ' / ' + detail : '') + ' / ' + refundNote;

    saveOrders(orders, order.id, 'キャンセル完了');
    closeCancelModal();
    closeModal();
    renderTable();
    showToast('注文 #'+order.id+' をキャンセルしました');
  };

  // ========== RETURN FLOW ==========
  window.openReturnModal = function() {
    if (!currentOrderId) return;
    var order = getOrder(currentOrderId);
    if (!order) return;
    document.getElementById('returnReason').value = '';
    document.getElementById('returnCondition').value = '未開封';
    document.getElementById('returnRefundMethod').value = '元の決済方法';
    // Populate checkboxes
    var cbHtml = '';
    order.items.forEach(function(item, idx) {
      cbHtml += '<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">';
      cbHtml += '<input type="checkbox" class="return-item-cb" value="'+idx+'" checked>';
      cbHtml += escapeHtml(item.name) + ' ('+escapeHtml(item.size)+'/'+escapeHtml(item.color)+') x'+item.qty;
      cbHtml += '</label>';
    });
    document.getElementById('returnItemsCheckboxes').innerHTML = cbHtml;
    document.getElementById('returnModal').classList.add('active');
  };

  window.confirmReturn = function() {
    var reason = document.getElementById('returnReason').value;
    if (!reason) { showToast('返品理由を選択してください'); return; }
    var condition = document.getElementById('returnCondition').value;
    var refundMethod = document.getElementById('returnRefundMethod').value;
    var checkedItems = [];
    var cbs = document.querySelectorAll('.return-item-cb:checked');
    for (var i = 0; i < cbs.length; i++) { checkedItems.push(cbs[i].value); }
    if (!checkedItems.length) { showToast('返品商品を選択してください'); return; }

    var order = getOrder(currentOrderId);
    if (!order) return;
    if (!order.statusHistory) order.statusHistory = [];
    order.statusHistory.push({ date: getNow(), from: order.status, to: '返品申請中' });
    order.status = '返品申請中';
    var itemNames = checkedItems.map(function(i) { return order.items[i] ? order.items[i].name : ''; }).join(', ');
    order.notes = (order.notes ? order.notes + '\n' : '') + '[返品] 理由: ' + reason + ' / 商品: ' + itemNames + ' / 状態: ' + condition + ' / 返金: ' + refundMethod;

    saveOrders(orders, order.id, '返品申請中');
    closeReturnModal();
    closeModal();
    renderTable();
    showToast('返品処理を開始しました（#'+order.id+'）');
  };

  // ========== INIT ==========
  renderTable();

})();
</script>
</body>
</html>
