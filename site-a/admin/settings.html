<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設定 | 管理画面 | 表参道布団店。</title>
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

/* === GLOBAL NAV WITH DROPDOWNS === */
.header{position:fixed;top:0;left:0;width:100%;height:72px;z-index:1000;background:rgba(45,45,45,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.header-inner{max-width:1400px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:100%}
.header-logo img{height:28px;width:auto}
.header-nav{display:flex;align-items:center;gap:32px}
.header-nav-item{position:relative}
.header-nav-item>a{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fff;transition:color 0.3s;text-decoration:none;padding:24px 0;display:block}
.header-nav-item>a:hover{color:#C9A96E}
/* Dropdown */
.nav-dropdown{position:absolute;top:100%;left:50%;transform:translateX(-50%);min-width:220px;background:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.12);opacity:0;visibility:hidden;transition:opacity 0.3s,visibility 0.3s;padding:16px 0;z-index:100}
.header-nav-item:hover .nav-dropdown{opacity:1;visibility:visible}
.nav-dropdown a{display:block;padding:10px 28px;font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:13px;font-weight:500;color:#1A1A1A;letter-spacing:0.04em;transition:color 0.2s,background 0.2s;text-decoration:none;white-space:nowrap}
.nav-dropdown a:hover{color:#C9A96E;background:rgba(201,169,110,0.06)}
/* Mega menu for PRODUCTS (with images) */
.nav-mega{position:absolute;top:100%;left:50%;transform:translateX(-50%);width:1100px;background:#fff;box-shadow:0 12px 48px rgba(0,0,0,0.15);opacity:0;visibility:hidden;transition:opacity 0.3s,visibility 0.3s;padding:20px;z-index:100;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.header-nav-item:hover .nav-mega{opacity:1;visibility:visible}
.nav-mega-card{display:block;text-decoration:none;border-radius:6px;overflow:hidden;transition:transform 0.25s,box-shadow 0.25s}
.nav-mega-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.1)}
.nav-mega-card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.nav-mega-card-label{display:block;padding:8px 4px 6px;font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#C9A96E;text-align:center}
.nav-mega-card-name{display:block;padding:0 4px 10px;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;color:#1A1A1A;text-align:center;letter-spacing:0.02em}
.nav-mega-card:hover .nav-mega-card-name{color:#C9A96E}
/* Actions */
.header-actions{display:flex;align-items:center;gap:16px}
.header-actions a,.header-actions button{background:none;border:none;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.08em;text-decoration:none;transition:color 0.3s}
.header-actions a:hover,.header-actions button:hover{color:#C9A96E}
.hamburger{display:none;flex-direction:column;gap:6px;background:none;border:none;cursor:pointer;padding:4px}
.hamburger span{display:block;width:28px;height:2px;background:#fff;transition:0.3s}
@media(max-width:1024px){.header-nav{display:none}.hamburger{display:flex}}
@media(max-width:768px){.header-inner{padding:0 20px}.header{height:64px}}
/* === END GLOBAL NAV === */

/* FOOTER */
.footer{padding:80px 0 40px;background:#2D2D2D;color:#fff}
.footer-inner{max-width:1400px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:48px}
.footer-logo{margin-bottom:16px}
.footer-logo img{height:24px}
.footer-desc{font-size:15px;line-height:2;color:rgba(255,255,255,0.4)}
.footer-nav-title{font-size:13px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#C9A96E;margin-bottom:16px}
.footer-nav a{display:block;font-size:15px;color:rgba(255,255,255,0.5);padding:5px 0;letter-spacing:0.03em;transition:color 0.3s;text-decoration:none}
.footer-nav a:hover{color:#C9A96E}
.footer-copy{text-align:center;padding-top:40px;margin-top:40px;border-top:1px solid rgba(255,255,255,0.08);font-size:14px;color:rgba(255,255,255,0.25);letter-spacing:0.06em}
@media(max-width:1024px){.footer-inner{grid-template-columns:1fr 1fr;gap:32px}}
@media(max-width:768px){.footer-inner{grid-template-columns:1fr 1fr;gap:16px 24px;text-align:left}.footer-brand{grid-column:1/-1;text-align:center}.footer-copy{font-size:10px}}

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter','Noto Sans JP',sans-serif; background:#F5F6FA; color:#333; }
  a { text-decoration:none; color:inherit; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:12px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.04em; padding:12px 16px; border-bottom:2px solid #EAEDF3; }
  td { padding:14px 16px; border-bottom:1px solid #F0F0F0; font-size:14px; vertical-align:middle; }
  tr:hover { background:#FAFBFD; }

</style>
</head>
