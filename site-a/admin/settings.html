/* === GLOBAL NAV WITH DROPDOWNS === */
.header{position:fixed;top:0;left:0;width:100%;height:72px;z-index:1000;background:rgba(45,45,45,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.header-inner{max-width:1400px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:100%}
.header-logo img{height:28px;width:auto}
.header-nav{display:flex;align-items:center;gap:32px}
.header-nav-item{position:relative}
.header-nav-item>a{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fff;transition:color 0.3s;text-decoration:none;padding:24px 0;display:block}
.header-nav-item>a:hover{color:#C9A96E}
/* Dropdown */
.nav-dropdown{position:absolute;top:100%;left:50%;transform:translateX(-50%);min-width:220px;background:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.12);opacity:0;visibility:hidden;transition:opacity 0.3s,visibility 0.3s;padding:16px 0;z-index:100}
.header-nav-item:hover .nav-dropdown{opacity:1;visibility:visible}
.nav-dropdown a{display:block;padding:10px 28px;font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:13px;font-weight:500;color:#1A1A1A;letter-spacing:0.04em;transition:color 0.2s,background 0.2s;text-decoration:none;white-space:nowrap}
.nav-dropdown a:hover{color:#C9A96E;background:rgba(201,169,110,0.06)}
/* Mega menu for PRODUCTS (with images) */
.nav-mega{position:absolute;top:100%;left:50%;transform:translateX(-50%);width:1100px;background:#fff;box-shadow:0 12px 48px rgba(0,0,0,0.15);opacity:0;visibility:hidden;transition:opacity 0.3s,visibility 0.3s;padding:20px;z-index:100;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.header-nav-item:hover .nav-mega{opacity:1;visibility:visible}
.nav-mega-card{display:block;text-decoration:none;border-radius:6px;overflow:hidden;transition:transform 0.25s,box-shadow 0.25s}
.nav-mega-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.1)}
.nav-mega-card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.nav-mega-card-label{display:block;padding:8px 4px 6px;font-family:'DM Sans','Noto Sans JP',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#C9A96E;text-align:center}
.nav-mega-card-name{display:block;padding:0 4px 10px;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:500;color:#1A1A1A;text-align:center;letter-spacing:0.02em}
.nav-mega-card:hover .nav-mega-card-name{color:#C9A96E}
/* Actions */
.header-actions{display:flex;align-items:center;gap:16px}
.header-actions a,.header-actions button{background:none;border:none;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.08em;text-decoration:none;transition:color 0.3s}
.header-actions a:hover,.header-actions button:hover{color:#C9A96E}
.hamburger{display:none;flex-direction:column;gap:6px;background:none;border:none;cursor:pointer;padding:4px}
.hamburger span{display:block;width:28px;height:2px;background:#fff;transition:0.3s}
@media(max-width:1024px){.header-nav{display:none}.hamburger{display:flex}}
@media(max-width:768px){.header-inner{padding:0 20px}.header{height:64px}}
/* === END GLOBAL NAV === */

/* FOOTER */
.footer{padding:80px 0 40px;background:#2D2D2D;color:#fff}
.footer-inner{max-width:1400px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:48px}
.footer-logo{margin-bottom:16px}
.footer-logo img{height:24px}
.footer-desc{font-size:15px;line-height:2;color:rgba(255,255,255,0.4)}
.footer-nav-title{font-size:13px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#C9A96E;margin-bottom:16px}
.footer-nav a{display:block;font-size:15px;color:rgba(255,255,255,0.5);padding:5px 0;letter-spacing:0.03em;transition:color 0.3s;text-decoration:none}
.footer-nav a:hover{color:#C9A96E}
.footer-copy{text-align:center;padding-top:40px;margin-top:40px;border-top:1px solid rgba(255,255,255,0.08);font-size:14px;color:rgba(255,255,255,0.25);letter-spacing:0.06em}
@media(max-width:1024px){.footer-inner{grid-template-columns:1fr 1fr;gap:32px}}
@media(max-width:768px){.footer-inner{grid-template-columns:1fr 1fr;gap:16px 24px;text-align:left}.footer-brand{grid-column:1/-1;text-align:center}.footer-copy{font-size:10px}}

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter','Noto Sans JP',sans-serif; background:#F5F6FA; color:#333; }
  a { text-decoration:none; color:inherit; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:12px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.04em; padding:12px 16px; border-bottom:2px solid #EAEDF3; }
  td { padding:14px 16px; border-bottom:1px solid #F0F0F0; font-size:14px; vertical-align:middle; }
  tr:hover { background:#FAFBFD; }

<div id="toast" style="display:none;position:fixed;bottom:32px;right:32px;background:#2D2D2D;color:#fff;padding:14px 28px;border-radius:8px;font-size:14px;font-weight:500;z-index:10000;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:opacity 0.3s;"></div>

<script>
(function() {
  'use strict';

  var STORAGE_KEY = 'omotesando_settings';

  // --- Default values ---
  var defaults = {
    storeName: '表参道布団店。',
    storeUrl: 'https://omotesando-futonten.com',
    email: 'info@omotesando-futonten.com',
    phone: '03-6804-xxxx',
    shippingCost: '全品送料無料',
    shippingDays: '3〜7営業日',
    notifyOrder: true,
    notifyStock: true,
    notifySlack: false
  };

  // --- DOM refs ---
  var contentArea = document.querySelector('[style*="padding:28px 32px"]');
  var cards = contentArea.querySelectorAll('[style*="border-radius:10px"]');

  // Store basic settings inputs
  var storeCard = cards[0];
  var storeInputs = storeCard.querySelectorAll('input');
  var inputStoreName = storeInputs[0];
  var inputUrl = storeInputs[1];
  var inputEmail = storeInputs[2];
  var inputPhone = storeInputs[3];

  // Shipping settings
  var shipCard = cards[1];
  var shipInputs = shipCard.querySelectorAll('input');
  var inputShipCost = shipInputs[0];
  var inputShipDays = shipInputs[1];

  // Notification checkboxes
  var notifCard = cards[2];
  var checkboxes = notifCard.querySelectorAll('input[type="checkbox"]');
  var chkOrder = checkboxes[0];
  var chkStock = checkboxes[1];
  var chkSlack = checkboxes[2];

  var saveBtn = document.getElementById('saveBtn');
  var resetBtn = document.getElementById('resetBtn');
  var unsavedIndicator = document.getElementById('unsavedIndicator');
  var toastEl = document.getElementById('toast');

  var isDirty = false;

  // --- Toast ---
  var toastTimer = null;
  function showToast(msg, isError) {
    toastEl.textContent = msg;
    toastEl.style.background = isError ? '#E74C3C' : '#2D2D2D';
    toastEl.style.display = 'block';
    toastEl.style.opacity = '1';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      toastEl.style.opacity = '0';
      setTimeout(function() { toastEl.style.display = 'none'; }, 300);
    }, 2500);
  }

  // --- Inline error ---
  function showError(input, msg) {
    clearError(input);
    input.style.borderColor = '#E74C3C';
    var err = document.createElement('div');
    err.className = 'field-error';
    err.style.cssText = 'color:#E74C3C;font-size:12px;margin-top:4px;';
    err.textContent = msg;
    input.parentElement.appendChild(err);
  }
  function clearError(input) {
    input.style.borderColor = '#EAEDF3';
    var existing = input.parentElement.querySelector('.field-error');
    if (existing) existing.remove();
  }
  function clearAllErrors() {
    [inputStoreName, inputUrl, inputEmail, inputPhone, inputShipCost, inputShipDays].forEach(clearError);
  }

  // --- Validation ---
  function validate() {
    clearAllErrors();
    var valid = true;

    if (inputEmail.value.indexOf('@') === -1) {
      showError(inputEmail, 'メールアドレスには@を含めてください');
      valid = false;
    }

    // Phone: allow digits, hyphens, and x placeholders
    var phoneClean = inputPhone.value.replace(/[-\s\uff0d]/g, '');
    if (phoneClean && !/^[0-9x]+$/i.test(phoneClean)) {
      showError(inputPhone, '電話番号は数字で入力してください');
      valid = false;
    }

    return valid;
  }

  // --- Collect form values ---
  function collectValues() {
    return {
      storeName: inputStoreName.value,
      storeUrl: inputUrl.value,
      email: inputEmail.value,
      phone: inputPhone.value,
      shippingCost: inputShipCost.value,
      shippingDays: inputShipDays.value,
      notifyOrder: chkOrder.checked,
      notifyStock: chkStock.checked,
      notifySlack: chkSlack.checked
    };
  }

  // --- Apply values to form ---
  function applyValues(vals) {
    inputStoreName.value = vals.storeName;
    inputUrl.value = vals.storeUrl;
    inputEmail.value = vals.email;
    inputPhone.value = vals.phone;
    inputShipCost.value = vals.shippingCost;
    inputShipDays.value = vals.shippingDays;
    chkOrder.checked = vals.notifyOrder;
    chkStock.checked = vals.notifyStock;
    chkSlack.checked = vals.notifySlack;
  }

  // --- Load from localStorage ---
  function loadSettingsLocal() {
    var stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        applyValues(JSON.parse(stored));
      } catch(e) {}
    }
  }

  function saveSettingsLocal(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadSettings() {
    loadSettingsLocal();
  }

  // --- Unsaved changes tracking ---
  function markDirty() {
    isDirty = true;
    unsavedIndicator.style.display = 'block';
  }
  function markClean() {
    isDirty = false;
    unsavedIndicator.style.display = 'none';
  }

  // Track changes on all inputs
  var allInputs = [inputStoreName, inputUrl, inputEmail, inputPhone, inputShipCost, inputShipDays];
  allInputs.forEach(function(inp) {
    inp.addEventListener('input', markDirty);
  });
  [chkOrder, chkStock, chkSlack].forEach(function(chk) {
    chk.addEventListener('change', markDirty);
  });

  // --- Save ---
  saveBtn.addEventListener('click', function() {
    if (!validate()) {
      showToast('入力内容を確認してください', true);
      return;
    }
    var vals = collectValues();
    saveSettingsLocal(vals);
    markClean();
    showToast('設定を保存しました');
    // API にも送信
    try {
      if (typeof AdminAPI !== 'undefined') {
        AdminAPI.updateSettings(vals).then(function() {
          console.log('[Settings] API保存成功');
        }).catch(function(err) {
          console.warn('[Settings] API保存失敗:', err.message);
        });
      }
    } catch(e) { console.warn('[Settings] API呼び出しエラー:', e.message); }
  });

  // --- Reset ---
  resetBtn.addEventListener('click', function() {
    if (confirm('すべての設定をデフォルトに戻しますか？')) {
      clearAllErrors();
      applyValues(defaults);
      localStorage.removeItem(STORAGE_KEY);
      markClean();
      showToast('デフォルト設定に戻しました');
    }
  });

  // --- Init ---
  loadSettings();

  // === データ読み込み: API優先、失敗時はlocalStorageフォールバック ===
  (async function loadFromAPI() {
    try {
      if (typeof AdminAPI !== 'undefined') {
        var apiData = await AdminAPI.getSettings();
        if (apiData && typeof apiData === 'object' && Object.keys(apiData).length > 0) {
          applyValues(apiData);
          saveSettingsLocal(apiData);
          markClean();
          console.log('[Settings] APIからデータ取得成功');
        } else {
          throw new Error('APIデータが空');
        }
      } else {
        throw new Error('AdminAPI未定義');
      }
    } catch(e) {
      console.warn('[Settings] APIフォールバック → localStorage:', e.message);
    }
  })();
})();
</script>
