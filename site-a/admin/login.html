<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面ログイン | 表参道布団店。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin:0; padding:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#2C2C2C; font-family:'Inter','Noto Sans JP',sans-serif;">

<div style="width:100%; max-width:420px; padding:20px;">
  <!-- Login Card -->
  <div style="background:#fff; border-radius:12px; padding:48px 40px; box-shadow:0 20px 60px rgba(0,0,0,0.3);">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:36px;">
      <div style="font-size:28px; font-weight:700; color:#1A1A1A; letter-spacing:0.02em; margin-bottom:4px;">表参道布団店。</div>
      <div style="font-size:14px; color:#888; font-weight:500; letter-spacing:0.05em;">管理画面ログイン</div>
    </div>

    <!-- Form -->
    <form onsubmit="event.preventDefault(); window.location.href='index.html';">
      <!-- Email -->
      <div style="margin-bottom:20px;">
        <label style="display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:6px;">メールアドレス</label>
        <input type="email" placeholder="admin@omotesando-futon.jp" required
          style="width:100%; padding:12px 14px; border:1px solid #DDD; border-radius:8px; font-size:14px; font-family:inherit; outline:none; transition:border-color 0.2s; box-sizing:border-box; background:#FAFAFA;"
          onfocus="this.style.borderColor='#C9A96E'; this.style.background='#fff';"
          onblur="this.style.borderColor='#DDD'; this.style.background='#FAFAFA';">
      </div>

      <!-- Password -->
      <div style="margin-bottom:28px;">
        <label style="display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:6px;">パスワード</label>
        <input type="password" placeholder="パスワードを入力" required
          style="width:100%; padding:12px 14px; border:1px solid #DDD; border-radius:8px; font-size:14px; font-family:inherit; outline:none; transition:border-color 0.2s; box-sizing:border-box; background:#FAFAFA;"
          onfocus="this.style.borderColor='#C9A96E'; this.style.background='#fff';"
          onblur="this.style.borderColor='#DDD'; this.style.background='#FAFAFA';">
      </div>

      <!-- Login Button -->
      <button type="submit"
        style="width:100%; padding:14px; background:#C9A96E; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; transition:background 0.2s; letter-spacing:0.03em;"
        onmouseover="this.style.background='#B8964E';"
        onmouseout="this.style.background='#C9A96E';">
        ログイン
      </button>
    </form>

    <!-- Forgot password -->
    <div style="text-align:center; margin-top:20px;">
      <a href="#" style="font-size:13px; color:#999; text-decoration:none;"
        onmouseover="this.style.color='#C9A96E';"
        onmouseout="this.style.color='#999';">
        パスワードをお忘れですか？
      </a>
    </div>
  </div>

  <!-- Footer -->
  <div style="text-align:center; margin-top:24px; font-size:12px; color:#777;">
    &copy; 2026 表参道布団店。 All rights reserved.
  </div>
</div>

<script src="../js/cart.js"></script>
</body>
</html>
