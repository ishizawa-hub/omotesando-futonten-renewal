<!DOCTYPE html>
<!-- Subject: 【運営通知】新規会員登録: {{customer_name}} -->
<html lang="ja" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <title>新規会員登録通知 | 表参道布団店。管理</title>
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:AllowPNG/><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#F7F6F3;font-family:'Noto Sans JP','Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;">
  <!-- Preheader -->
  <div style="display:none;font-size:1px;color:#F7F6F3;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;">
    新規会員登録: {{customer_name}} ({{customer_email}})
  </div>

  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#F7F6F3;">
    <tr>
      <td align="center" style="padding:24px 16px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;width:100%;">

          <!-- Header -->
          <tr>
            <td align="center" style="background-color:#2D2D2D;padding:20px 24px;border-radius:8px 8px 0 0;">
              <img src="https://ishizawa-hub.github.io/omotesando-futonten-renewal/site-a/images/logo.svg" alt="表参道布団店。" height="24" style="display:block;height:24px;width:auto;">
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background-color:#FFFFFF;padding:40px;">

              <!-- Badge -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td style="padding-bottom:20px;">
                    <span style="display:inline-block;background-color:#E3F2FD;color:#1565C0;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;">NEW MEMBER</span>
                  </td>
                </tr>
              </table>

              <!-- Heading -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td style="padding-bottom:8px;">
                    <h1 style="margin:0;font-size:20px;font-weight:700;color:#1A1A1A;">新規会員登録</h1>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr><td style="padding-bottom:24px;"><div style="width:40px;height:2px;background-color:#C9A96E;"></div></td></tr>
              </table>

              <!-- Member Info -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom:24px;">
                <tr>
                  <td style="padding:20px;background-color:#FAFAF8;border-radius:8px;">

                    <!-- Name -->
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom:16px;">
                      <tr>
                        <td style="padding-bottom:4px;font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.04em;">お名前</td>
                      </tr>
                      <tr>
                        <td style="font-size:16px;font-weight:600;color:#1A1A1A;">{{customer_name}}</td>
                      </tr>
                    </table>

                    <!-- Email -->
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-bottom:16px;">
                      <tr>
                        <td style="padding-bottom:4px;font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.04em;">メールアドレス</td>
                      </tr>
                      <tr>
                        <td style="font-size:14px;color:#555;">{{customer_email}}</td>
                      </tr>
                    </table>

                    <!-- Registered At -->
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                      <tr>
                        <td style="padding-bottom:4px;font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.04em;">登録日時</td>
                      </tr>
                      <tr>
                        <td style="font-size:14px;color:#555;">{{registered_at}}</td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>

              <!-- CTA -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td align="center">
                    <a href="https://omotesando-futonten.com/admin/customers.html" style="display:inline-block;background-color:#C9A96E;color:#FFFFFF;font-size:14px;font-weight:600;text-decoration:none;padding:14px 48px;border-radius:4px;letter-spacing:0.04em;">管理画面で確認</a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#F0EFEC;padding:24px 40px;border-radius:0 0 8px 8px;text-align:center;">
              <p style="margin:0 0 4px;font-size:12px;font-weight:600;color:#888;">表参道布団店。 運営通知</p>
              <p style="margin:0;font-size:11px;color:#AAA;">このメールは管理者向けの自動通知です。</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
