<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -40 1200 680" width="1200" height="680">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#EDE6D8"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4C9A8"/>
      <stop offset="40%" stop-color="#C8BD9F"/>
      <stop offset="100%" stop-color="#B8AD8F"/>
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="2" dy="4" result="offsetBlur"/>
      <feComponentTransfer result="fade">
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="fade"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="-40" width="1200" height="680" fill="url(#skyGrad)"/>

  <!-- Ground -->
  <ellipse cx="600" cy="580" rx="700" ry="120" fill="url(#groundGrad)"/>

  <!-- Grass tufts - scattered -->
  <g stroke="#8B9968" stroke-width="1.5" fill="none" stroke-linecap="round">
