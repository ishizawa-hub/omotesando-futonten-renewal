    <path d="M565,540 Q567,515 562,500"/>
    <path d="M570,540 Q575,520 572,503"/>
    <path d="M575,542 Q570,522 573,508"/>

    <!-- Right grass -->
    <path d="M780,530 Q778,510 775,495"/>
    <path d="M785,530 Q787,505 782,490"/>
    <path d="M790,530 Q795,510 792,493"/>

    <!-- Far right grass -->
