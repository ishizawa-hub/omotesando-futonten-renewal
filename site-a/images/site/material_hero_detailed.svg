    <path d="M120,520 Q118,500 115,485"/>
    <path d="M125,520 Q127,495 122,478"/>
    <path d="M130,520 Q135,500 132,480"/>
    <path d="M128,522 Q120,505 124,490"/>

    <!-- Center-left grass -->
    <path d="M340,535 Q338,515 335,500"/>
    <path d="M345,535 Q347,510 342,495"/>
    <path d="M350,535 Q355,515 352,498"/>

    <!-- Center grass -->
